                app_config: false,
                team_entries: false,
                create_transaction_history: false
            }
        });
        const [loading, setLoading] = useState(false);
        const [message, setMessage] = useState('');
        const [miniAdmins, setMiniAdmins] = useState([]);
        const [loadingMiniAdmins, setLoadingMiniAdmins] = useState(true);

        // Load existing mini admins
        useEffect(() => {
            const unsubscribe = db.collection('admin_roles').onSnapshot(snapshot => {
                const admins = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                setMiniAdmins(admins);
                setLoadingMiniAdmins(false);
            }, error => {
                console.error('Error fetching mini admins:', error);
                setLoadingMiniAdmins(false);
            });

            return () => unsubscribe();
        }, []);

        const handleInputChange = (e) => {
            const { name, value } = e.target;
            setFormData(prev => ({
                ...prev,
                [name]: value
            }));
        };

        const handlePermissionChange = (permission, checked) => {
            setFormData(prev => ({
                ...prev,
                permissions: {
                    ...prev.permissions,
                    [permission]: checked
                }
            }));
        };

        const handleSelectAll = (checked) => {
            const newPermissions = {};
            Object.keys(formData.permissions).forEach(key => {
                newPermissions[key] = checked;
            });
            setFormData(prev => ({
                ...prev,
                permissions: newPermissions
            }));
        };

        // Password hashing function (simple hash for demo - use proper hashing in production)
        const hashPassword = async (password) => {
            const encoder = new TextEncoder();
            const data = encoder.encode(password + 'proclash_salt_2024'); // Add salt
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        };

        const handleSubmit = async (e) => {
            e.preventDefault();
            setLoading(true);
            setMessage('');

            try {
                if (!formData.username.trim()) {
                    throw new Error('Please enter a unique username');
                }

                if (!formData.email.trim()) {
                    throw new Error('Please enter the user\'s email address');
                }

                if (!formData.password.trim()) {
                    throw new Error('Please enter a password');
                }

                if (formData.password.length < 6) {
                    throw new Error('Password must be at least 6 characters long');
                }

                if (formData.password !== formData.confirmPassword) {
                    throw new Error('Passwords do not match');
                }

                // Check if at least one permission is selected
                const hasPermissions = Object.values(formData.permissions).some(permission => permission);
                if (!hasPermissions) {
                    throw new Error('Please select at least one permission for the mini admin');
                }

                // Check if mini admin already exists (by username or email)
                const existingAdmin = miniAdmins.find(admin => 
                    admin.username === formData.username.trim() || admin.email === formData.email.trim()
                );
                if (existingAdmin) {
                    throw new Error('A mini admin with this username or email already exists');
                }

                // Hash the password
                const hashedPassword = await hashPassword(formData.password);

                // Create mini admin role
                const miniAdminData = {
                    username: formData.username.trim(),
                    email: formData.email.trim(),
                    password: hashedPassword,
                    permissions: formData.permissions,
                    role: 'mini_admin',
                    createdAt: serverTimestamp(),
                    createdBy: auth.currentUser?.email || 'Unknown Admin',
                    isActive: true,
                    lastLogin: null,
                    loginAttempts: 0,
                    lockedUntil: null
                };

                await db.collection('admin_roles').add(miniAdminData);

                setMessage(`✅ Mini admin created successfully! Username: ${formData.username} can now login with their credentials.`);
                setFormData({
                    username: '',
                    email: '',
                    password: '',
                    confirmPassword: '',
                    permissions: {
                        dashboard: false,
                        users: false,
                        wallet_requests: false,
                        tournaments: false,
                        live_joins: false,
                        support_tickets: false,
                        messages: false,
                        transactions: false,
                        game_profiles: false,
                        app_settings: false,
                        app_config: false,
                        team_entries: false,
                        create_transaction_history: false
                    }
                });

            } catch (error) {
                console.error('Error creating mini admin:', error);
                setMessage(`❌ Error: ${error.message}`);

                    isActive: !currentStatus,
                    updatedAt: serverTimestamp(),
                    updatedBy: auth.currentUser?.email || 'Unknown Admin'

    function CreateTransactionHistory() {
        const [formData, setFormData] = useState({
            email: '',
            transactionType: 'Refund',
            amount: '',
            status: 'Complete'
        });
        const [loading, setLoading] = useState(false);
        const [message, setMessage] = useState('');

        // 🔥 AUTO-SYNC ALL TRANSACTIONS ON COMPONENT LOAD
        useEffect(() => {
            console.log('🔄 CREATE TRANSACTION HISTORY: Component loaded, checking sync status...');
            // Auto-sync all past transactions when component loads
            ensureAllTransactionsAreSynced();
        }, []);

        const transactionTypes = [
            'Refund',
            'Winning Prize 🏆',
            'Kill Prize 🏆',
            'Deposit',
            'Withdrawal',
            'Tournament Entry'
        ];

        const statusOptions = ['Refund', 'Approve', 'Complete', 'Cancel'];

        const handleInputChange = (e) => {
            const { name, value } = e.target;
            setFormData(prev => ({
                ...prev,
                [name]: value
            }));
        };

        const getWalletBalanceChange = (type, amount) => {
            const positiveTypes = ['Refund', 'Winning Prize 🏆', 'Kill Prize 🏆', 'Deposit'];
            const negativeTypes = ['Withdrawal', 'Tournament Entry'];
            
            if (positiveTypes.includes(type)) {
                return parseFloat(amount);
            } else if (negativeTypes.includes(type)) {
                return -parseFloat(amount);
            }
            return 0;
        };

        const handleSubmit = async (e) => {
            e.preventDefault();
            setLoading(true);
            setMessage('');

            try {
                const amount = parseFloat(formData.amount);
                if (isNaN(amount) || amount <= 0) {
                    throw new Error('Please enter a valid amount greater than 0');
                }

                // Find user by email
                const usersSnapshot = await db.collection('users').where('email', '==', formData.email).get();
                if (usersSnapshot.empty) {
                    throw new Error('User not found with this email address');
                }

                const userDoc = usersSnapshot.docs[0];
                const userId = userDoc.id;
                const userData = userDoc.data();
                const currentBalance = userData.walletBalance || 0;

                // Calculate balance change
                const balanceChange = getWalletBalanceChange(formData.transactionType, amount);
                const newBalance = currentBalance + balanceChange;

                if (newBalance < 0) {
                    throw new Error(`Insufficient balance. Current: 🪙${currentBalance}, Required: 🪙${Math.abs(balanceChange)}`);
                }

                // Map admin panel status to Flutter app expected status
                const mappedStatus = formData.status.toLowerCase() === 'complete' ? 'completed' :
                                   formData.status.toLowerCase() === 'approve' ? 'completed' :
                                   formData.status.toLowerCase() === 'cancel' ? 'cancelled' :
                                   formData.status.toLowerCase();

                // Map admin panel types to Flutter app transaction types for consistency
                const mappedTransactionType = formData.transactionType === 'Kill Prize 🏆' ? 'killPrize' :
                                            formData.transactionType === 'Winning Prize 🏆' ? 'winningPrize' :
                                            formData.transactionType === 'Tournament Entry' ? 'tournament_entry' :
                                            formData.transactionType === 'Deposit' ? 'deposit' :
                                            formData.transactionType === 'Withdrawal' ? 'withdrawal' :
                                            formData.transactionType === 'Refund' ? 'refund' :
                                            formData.transactionType.toLowerCase().replace(' ', '_');
                
                console.log('🔄 TYPE MAPPING:', {
                    original: formData.transactionType,
                    mapped: mappedTransactionType,
                    status: formData.status,
                    mappedStatus: mappedStatus
                });

                // 🔥 ENHANCED: Create transaction record with GUARANTEED real-time sync structure
                const now = new Date();
                const globalTransactionData = {
                    userId: userId,
                    userEmail: formData.email,
                    type: mappedTransactionType,
                    amount: balanceChange, // Use balanceChange (positive/negative) for consistency with Flutter app
                    status: mappedStatus, // Use mapped status for Flutter app compatibility
                    description: `Admin: ${formData.transactionType} - 🪙${amount} coins`,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(), // Primary timestamp for Flutter app sorting
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(), // Backup timestamp
                    clientTimestamp: now, // Client timestamp for immediate ordering
                    createdBy: 'admin',
                    adminEmail: auth.currentUser.email,
                    // Additional fields for admin tracking
                    originalType: formData.transactionType,
                    originalStatus: formData.status,
                    balanceChange: balanceChange,
                    previousBalance: currentBalance,
                    newBalance: newBalance,
                    // 🔥 REAL-TIME SYNC MARKERS
                    isAdminCreated: true,
                    syncVersion: 'v4.0',
                    realTimeSync: true
                };

                // Create the transaction with a specific ID for consistency
                const transactionRef = db.collection('transactions').doc();
                await transactionRef.set(globalTransactionData);

                // Create identical transaction record in user's wallet_transactions subcollection
                const userTransactionData = {
                    ...globalTransactionData,
                    adminNotes: `Admin Created: ${formData.transactionType} - Amount: 🪙${amount} - Status: ${formData.status}`,
                    // Ensure all required fields for Flutter app are present
                    txnId: transactionRef.id,
                    // Add explicit fields that Flutter app expects
                    description: `Admin: ${formData.transactionType} - 🪙${amount} coins`
                };

                await db.collection('users').doc(userId).collection('wallet_transactions').doc(transactionRef.id).set(userTransactionData);

                console.log(`🔥 REAL-TIME SYNC: Transaction ${transactionRef.id} created in both collections for instant mobile app sync`);
                console.log('📊 GLOBAL COLLECTION PATH:', `transactions/${transactionRef.id}`);
                console.log('📱 USER COLLECTION PATH:', `users/${userId}/wallet_transactions/${transactionRef.id}`);
                console.log('👤 USER ID:', userId);
                console.log('📧 USER EMAIL:', formData.email);
                console.log('🔥 ENHANCED SYNC: Transaction created with real-time markers for guaranteed detection');
                console.log('⚡ SYNC VERSION: v4.0 with enhanced real-time capabilities');
                console.log('📊 TRANSACTION DATA:', {

                    userId: userId,

                });

            setLoading(true);

                const snapshot = await db.collection('transactions')
                    .where('createdBy', '==', 'admin')
                    .orderBy('createdAt', 'desc')
                    .limit(50)
                    .get();

                const txnData = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data(),
                    createdAt: doc.data().createdAt?.toDate() || new Date()
                }));

                setTransactions(txnData);
            } catch (error) {
                console.error('Error loading admin transactions:', error);
                // Fallback without orderBy
                try {
                    const fallbackSnapshot = await db.collection('transactions')
                        .where('createdBy', '==', 'admin')
                        .limit(50)
                        .get();

                    const txnData = fallbackSnapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data(),
                        createdAt: doc.data().createdAt?.toDate() || new Date()
                    })).sort((a, b) => b.createdAt - a.createdAt);

    // ==========================
    // COMPREHENSIVE SYNC FUNCTION FOR ALL TRANSACTIONS
    // ==========================
    async function ensureAllTransactionsAreSynced() {
        console.log('🔄 STARTING COMPREHENSIVE TRANSACTION SYNC CHECK...');
        
        try {
            // Get all transactions from global collection
            const globalTransactions = await db.collection('transactions').get();
            let syncedCount = 0;
            let alreadySyncedCount = 0;
            
            for (const doc of globalTransactions.docs) {
                const data = doc.data();
                const userId = data.userId;
                
                if (!userId) continue;
                
                // Check if transaction exists in user's wallet_transactions
                const userTransactionRef = db.collection('users').doc(userId).collection('wallet_transactions').doc(doc.id);
                const userTransactionDoc = await userTransactionRef.get();
                
                if (!userTransactionDoc.exists) {
                    // Transaction missing from user's wallet_transactions - sync it
                    const syncData = {
                        ...data,
                        txnId: doc.id,
                        adminNotes: data.adminNotes || `Synced: ${data.type} - 🪙${data.amount}`,
                        description: data.description || `${data.type}: 🪙${data.amount} coins`
                    };
                    
                    await userTransactionRef.set(syncData);
                    syncedCount++;
                    console.log(`✅ SYNCED: Transaction ${doc.id.substring(0, 8)} added to user ${userId.substring(0, 8)} wallet`);
                } else {
                    alreadySyncedCount++;
                }
            }
            
            console.log(`🔥 SYNC COMPLETE: ${syncedCount} transactions synced, ${alreadySyncedCount} already synced`);
            console.log('✅ ALL PAST, CURRENT & FUTURE TRANSACTIONS ARE NOW GUARANTEED TO SYNC');
            
        } catch (error) {
            console.error('❌ SYNC ERROR:', error);
        }
    }

                                                    <span className={`inline-flex px-2 py-1 text-xs font-semibold rounded-full ${
                                                        transaction.status === 'Complete' ? 'bg-green-100 text-green-800' :
                                                        transaction.status === 'Approve' ? 'bg-blue-100 text-blue-800' :
                                                        transaction.status === 'Refund' ? 'bg-yellow-100 text-yellow-800' :
                                                        'bg-red-100 text-red-800'
                                                    }`}>
                                                        {transaction.status}
                                                    </span>
                                                </td>
                                                <td className="px-4 py-4 whitespace-nowrap text-sm font-medium">
                                                    <span className={transaction.balanceChange >= 0 ? 'text-green-600' : 'text-red-600'}>
                                                        {transaction.balanceChange >= 0 ? '+' : ''}₹{Math.abs(transaction.balanceChange)}
                                                    </span>
                                                </td>
                                                <td className="px-4 py-4 whitespace-nowrap text-sm text-gray-900">
                                                    ₹{transaction.newBalance || 0}
                                                </td>
                                                <td className="px-4 py-4 whitespace-nowrap text-sm text-gray-500">
                                                    {transaction.createdBy === 'admin' ? 
                                                        `Admin (${transaction.adminEmail || 'Unknown'})` : 
                                                        transaction.createdBy || 'System'
                                                    }
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                )}
            </Card>
        );
    }

    // ==========================
    // Referral Management Component
    // ==========================
    function ReferralManagement() {
        const [referrals, setReferrals] = useState([]);
        const [referralStats, setReferralStats] = useState([]);
        const [loading, setLoading] = useState(true);
        const [selectedTab, setSelectedTab] = useState('referrals');
        const [statusFilter, setStatusFilter] = useState('all');
        const [searchTerm, setSearchTerm] = useState('');

        useEffect(() => {
            const unsubscribeReferrals = db.collection('referrals')
                .orderBy('createdAt', 'desc')
                .onSnapshot(async (snapshot) => {
                    const referralData = [];
                    for (const doc of snapshot.docs) {
                        const data = doc.data();
                        
                        // Fetch user emails for referrer and referred user
                        let referrerEmail = 'N/A';
                        let referredEmail = 'N/A';
                        
                        try {
                            if (data.referrerId) {
                                const referrerDoc = await db.collection('users').doc(data.referrerId).get();
                                if (referrerDoc.exists) {
                                    referrerEmail = referrerDoc.data().email || 'N/A';
                                }
                            }
                            
                            if (data.referredUserId) {
                                const referredDoc = await db.collection('users').doc(data.referredUserId).get();
                                if (referredDoc.exists) {
                                    referredEmail = referredDoc.data().email || 'N/A';
                                }
                            }
                        } catch (error) {
                            console.error('Error fetching user emails:', error);
                        }
                        
                        referralData.push({
                            id: doc.id,
                            ...data,
                            referrerEmail,
                            referredEmail,
                            createdAt: data.createdAt?.toDate?.() || new Date()
                        });
                    }
                    setReferrals(referralData);
                    setLoading(false);
                });

            const unsubscribeStats = db.collection('user_referral_stats')
                .orderBy('totalReferrals', 'desc')
                .limit(50)
                .onSnapshot(async (snapshot) => {
                    const statsData = [];
                    for (const doc of snapshot.docs) {
                        const data = doc.data();
                        
                        // Fetch user email
                        let userEmail = 'N/A';
                        try {
                            const userDoc = await db.collection('users').doc(doc.id).get();
                            if (userDoc.exists) {
                                userEmail = userDoc.data().email || 'N/A';
                            }
                        } catch (error) {
                            console.error('Error fetching user email:', error);
                        }
                        
                        statsData.push({
                            userId: doc.id,
                            userEmail,
                            ...data
                        });
                    }
                    setReferralStats(statsData);
                });

            return () => {
                unsubscribeReferrals();
                unsubscribeStats();
            };
        }, []);

        const getStatusBadge = (status) => {
            const statusStyles = {
                pending: 'bg-yellow-500/20 text-yellow-300 border-yellow-500/30',
                completed: 'bg-green-500/20 text-green-300 border-green-500/30',
                cancelled: 'bg-red-500/20 text-red-300 border-red-500/30',
                expired: 'bg-gray-500/20 text-gray-300 border-gray-500/30'
            };
            return (
                <span className={`px-2 py-1 rounded-full text-xs font-medium border ${statusStyles[status] || statusStyles.pending}`}>
                    {status?.charAt(0).toUpperCase() + status?.slice(1) || 'Pending'}
                </span>
            );
        };

        const updateReferralStatus = async (referralId, newStatus) => {
            try {
                await db.collection('referrals').doc(referralId).update({
                    status: newStatus,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedBy: auth.currentUser?.email || 'admin'
                });
                console.log(`Referral ${referralId} status updated to ${newStatus}`);
            } catch (error) {
                console.error('Error updating referral status:', error);
                alert('Failed to update referral status');
            }
        };

        const filteredReferrals = referrals.filter(referral => {
            const matchesStatus = statusFilter === 'all' || referral.status === statusFilter;
            const matchesSearch = searchTerm === '' || 
                referral.referrerEmail.toLowerCase().includes(searchTerm.toLowerCase()) ||
                referral.referredEmail.toLowerCase().includes(searchTerm.toLowerCase()) ||
                referral.referralCode.toLowerCase().includes(searchTerm.toLowerCase());
            return matchesStatus && matchesSearch;
        });

        const totalReferrals = referrals.length;
        const completedReferrals = referrals.filter(r => r.status === 'completed').length;
        const pendingReferrals = referrals.filter(r => r.status === 'pending').length;
        const totalRewards = referrals.filter(r => r.status === 'completed').reduce((sum, r) => sum + (r.rewardAmount || 0), 0);

        if (loading) {
            return (
                <Card>
                    <div className="flex items-center justify-center py-12">
                        <div className="spinner w-8 h-8"></div>
                        <span className="ml-3 text-gray-300">Loading referral data...</span>
                    </div>
                </Card>
            );
        }

        return (
            <div className="space-y-6">
                <div className="flex items-center justify-between">
                    <h2 className="text-2xl font-bold text-white">Referral Management</h2>
                    <div className="flex gap-2">
                        <button
                            onClick={() => setSelectedTab('referrals')}
                            className={`px-4 py-2 rounded-lg text-sm font-medium transition-colors ${
                                selectedTab === 'referrals' 
                                    ? 'bg-blue-600 text-white' 
                                    : 'bg-gray-700 text-gray-300 hover:bg-gray-600'
                            }`}
                        >
                            Referrals
                        </button>
                        <button
                            onClick={() => setSelectedTab('stats')}
                            className={`px-4 py-2 rounded-lg text-sm font-medium transition-colors ${
                                selectedTab === 'stats' 
                                    ? 'bg-blue-600 text-white' 
                                    : 'bg-gray-700 text-gray-300 hover:bg-gray-600'
                            }`}
                        >
                            Top Referrers
                        </button>
                    </div>
                </div>

                {/* Overview Stats */}
                <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <Card className="p-6">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-blue-500/20 rounded-lg flex items-center justify-center">
                                <span className="text-blue-400 text-xl">👥</span>
                            </div>
                            <div>
                                <p className="text-gray-400 text-sm">Total Referrals</p>
                                <p className="text-2xl font-bold text-white">{totalReferrals}</p>
                            </div>
                        </div>
                    </Card>
                    <Card className="p-6">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-green-500/20 rounded-lg flex items-center justify-center">
                                <span className="text-green-400 text-xl">✅</span>
                            </div>
                            <div>
                                <p className="text-gray-400 text-sm">Completed</p>
                                <p className="text-2xl font-bold text-white">{completedReferrals}</p>
                            </div>
                        </div>
                    </Card>
                    <Card className="p-6">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-yellow-500/20 rounded-lg flex items-center justify-center">
                                <span className="text-yellow-400 text-xl">⏳</span>
                            </div>
                            <div>
                                <p className="text-gray-400 text-sm">Pending</p>
                                <p className="text-2xl font-bold text-white">{pendingReferrals}</p>
                            </div>
                        </div>
                    </Card>
                    <Card className="p-6">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-purple-500/20 rounded-lg flex items-center justify-center">
                                <span className="text-purple-400 text-xl">💰</span>
                            </div>
                            <div>
                                <p className="text-gray-400 text-sm">Total Rewards</p>
                                <p className="text-2xl font-bold text-white">₹{totalRewards}</p>
                            </div>
                        </div>
                    </Card>
                </div>

                {selectedTab === 'referrals' && (
                    <Card>
                        <div className="p-6">
                            <div className="flex flex-col sm:flex-row gap-4 mb-6">
                                <div className="flex-1">
                                    <input
                                        type="text"
                                        placeholder="Search by email or referral code..."
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                        className="admin-input w-full"
                                    />
                                </div>
                                <select
                                    value={statusFilter}
                                    onChange={(e) => setStatusFilter(e.target.value)}
                                    className="admin-input"
                                >
                                    <option value="all">All Status</option>
                                    <option value="pending">Pending</option>
                                    <option value="completed">Completed</option>
                                    <option value="cancelled">Cancelled</option>
                                    <option value="expired">Expired</option>
                                </select>
                            </div>

                            <div className="overflow-x-auto">
                                <table className="w-full">
                                    <thead>
                                        <tr className="border-b border-gray-700">
                                            <th className="text-left py-3 px-4 font-medium text-gray-300">Referral Code</th>
                                            <th className="text-left py-3 px-4 font-medium text-gray-300">Referrer</th>
                                            <th className="text-left py-3 px-4 font-medium text-gray-300">Referred User</th>
                                            <th className="text-left py-3 px-4 font-medium text-gray-300">Status</th>
                                            <th className="text-left py-3 px-4 font-medium text-gray-300">Reward</th>
                                            <th className="text-left py-3 px-4 font-medium text-gray-300">Date</th>
                                            <th className="text-left py-3 px-4 font-medium text-gray-300">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredReferrals.map((referral) => (
                                            <tr key={referral.id} className="border-b border-gray-800 hover:bg-gray-800/50">
                                                <td className="py-3 px-4">
                                                    <span className="font-mono text-sm bg-gray-700 px-2 py-1 rounded">
                                                        {referral.referralCode}
                                                    </span>
                                                </td>
                                                <td className="py-3 px-4 text-gray-300">{referral.referrerEmail}</td>
                                                <td className="py-3 px-4 text-gray-300">{referral.referredEmail}</td>
                                                <td className="py-3 px-4">{getStatusBadge(referral.status)}</td>
                                                <td className="py-3 px-4 text-gray-300">
                                                    {referral.rewardAmount ? `₹${referral.rewardAmount}` : '-'}
                                                </td>
                                                <td className="py-3 px-4 text-gray-400 text-sm">
                                                    {referral.createdAt.toLocaleDateString()}
                                                </td>
                                                <td className="py-3 px-4">
                                                    <select
                                                        value={referral.status}
                                                        onChange={(e) => updateReferralStatus(referral.id, e.target.value)}

                                                    >
                                                        <option value="pending">Pending</option>
                                                        <option value="completed">Completed</option>
                                                        <option value="cancelled">Cancelled</option>
                                                        <option value="expired">Expired</option>

                                    <div className="text-center py-8 text-gray-400">
                                        No referrals found matching your criteria.
                                    </div>

                            </div>

                    </Card>
                )}

                {selectedTab === 'stats' && (
                    <Card>
                        <div className="p-6">
                            <h3 className="text-lg font-semibold text-white mb-4">Top Referrers</h3>
                            <div className="overflow-x-auto">
                                <table className="w-full">
                                    <thead>
                                        <tr className="border-b border-gray-700">
                                            <th className="text-left py-3 px-4 font-medium text-gray-300">Rank</th>
                                            <th className="text-left py-3 px-4 font-medium text-gray-300">User</th>
                                            <th className="text-left py-3 px-4 font-medium text-gray-300">Referral Code</th>
                                            <th className="text-left py-3 px-4 font-medium text-gray-300">Total Referrals</th>
                                            <th className="text-left py-3 px-4 font-medium text-gray-300">Completed</th>
                                            <th className="text-left py-3 px-4 font-medium text-gray-300">Total Earnings</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {referralStats.map((stat, index) => (
                                            <tr key={stat.userId} className="border-b border-gray-800 hover:bg-gray-800/50">
                                                <td className="py-3 px-4">
                                                    <div className="flex items-center gap-2">
                                                        {index < 3 && (
                                                            <span className="text-lg">
                                                                {index === 0 ? '🥇' : index === 1 ? '🥈' : '🥉'}
                                                            </span>

                                                        <span className="text-gray-300">#{index + 1}</span>
                                                    </div>

                                                <td className="py-3 px-4 text-gray-300">{stat.userEmail}</td>
                                                <td className="py-3 px-4">
                                                    <span className="font-mono text-sm bg-gray-700 px-2 py-1 rounded">
                                                        {stat.referralCode}
                                                    </span>
                                                </td>
                                                <td className="py-3 px-4 text-gray-300">{stat.totalReferrals || 0}</td>
                                                <td className="py-3 px-4 text-gray-300">{stat.completedReferrals || 0}</td>
                                                <td className="py-3 px-4 text-green-400 font-medium">₹{stat.totalEarnings || 0}</td>
