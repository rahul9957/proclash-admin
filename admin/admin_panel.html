    // ==========================
    // Send Notifications Component
    // ==========================
    function SendNotifications() {
        const [formData, setFormData] = useState({
            recipientType: 'single', // 'single', 'all', 'role'
            userId: '',
            userEmail: '',
            title: '',
            message: '',
            type: 'system',
            priority: 'normal'
        });
        const [loading, setLoading] = useState(false);
        const [message, setMessage] = useState('');
        const [users, setUsers] = useState([]);
        const [filteredUsers, setFilteredUsers] = useState([]);

        // Load users for selection
        useEffect(() => {
            const loadUsers = async () => {
                try {
                    const usersSnapshot = await db.collection('users').orderBy('name').get();
                    const usersData = usersSnapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    setUsers(usersData);
                    setFilteredUsers(usersData);
                } catch (error) {
                    console.error('Error loading users:', error);
                }
            };
            loadUsers();
        }, []);

        const handleInputChange = (e) => {
            const { name, value } = e.target;
            setFormData(prev => ({
                ...prev,
                [name]: value
            }));

            // Filter users when email is typed
            if (name === 'userEmail') {
                const filtered = users.filter(user => 
                    user.email?.toLowerCase().includes(value.toLowerCase()) ||
                    user.name?.toLowerCase().includes(value.toLowerCase())
                );
                setFilteredUsers(filtered);
            }
        };

        const selectUser = (user) => {
            setFormData(prev => ({
                ...prev,
                userId: user.id,
                userEmail: user.email
            }));
            setFilteredUsers([]);
        };

        const handleSubmit = async (e) => {
            e.preventDefault();
            setLoading(true);
            setMessage('');

            try {
                if (formData.recipientType === 'single') {
                    // Send to single user
                    if (!formData.userId && formData.userEmail) {
                        // Find user by email
                        const user = users.find(u => u.email === formData.userEmail);
                        if (!user) {
                            throw new Error('User not found with this email');
                        }
                        formData.userId = user.id;
                    }

                    if (!formData.userId) {
                        throw new Error('Please select a user');
                    }

                    // Create notification for single user
                    await db.collection('notifications').add({
                        userId: formData.userId,
                        title: formData.title,
                        message: formData.message,
                        type: formData.type,
                        data: {
                            priority: formData.priority,
                            sentBy: 'admin',
                            adminEmail: auth.currentUser?.email || 'admin'
                        },
                        isRead: false,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    });

                    setMessage(`✅ Notification sent successfully to ${formData.userEmail}!`);

                } else if (formData.recipientType === 'all') {
                    // Send to all users
                    const batch = db.batch();
                    let count = 0;

                    for (const user of users) {
                        const notificationRef = db.collection('notifications').doc();
                        batch.set(notificationRef, {
                            userId: user.id,
                            title: formData.title,
                            message: formData.message,
                            type: formData.type,
                            data: {
                                priority: formData.priority,
                                sentBy: 'admin',
                                adminEmail: auth.currentUser?.email || 'admin'
                            },
                            isRead: false,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        });
                        count++;

                        // Commit in batches of 500 (Firestore limit)
                        if (count % 500 === 0) {
                            await batch.commit();
                            batch = db.batch();
                        }
                    }

                    // Commit remaining notifications
                    if (count % 500 !== 0) {
                        await batch.commit();
                    }

                    setMessage(`✅ Notification sent successfully to ${count} users!`);
                }

                // Reset form
                setFormData({
                    recipientType: 'single',
                    userId: '',
                    userEmail: '',
                    title: '',
                    message: '',
                    type: 'system',
                    priority: 'normal'
                });

            } catch (error) {
                console.error('Error sending notification:', error);
                setMessage(`❌ Error: ${error.message}`);
            } finally {
                setLoading(false);
            }
        };

        return (
            <div>
                <SectionHeader title="Send Push Notifications" />
                
                <Card>
                    <h3 className="text-lg font-semibold text-gray-800 mb-4">Create & Send Notification</h3>
                    <form onSubmit={handleSubmit} className="space-y-4">
                        
                        {/* Recipient Type */}
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">
                                Send To *
                            </label>
                            <select
                                name="recipientType"
                                value={formData.recipientType}
                                onChange={handleInputChange}
                                required
                                className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                            >
                                <option value="single">Single User</option>
                                <option value="all">All Users</option>
                            </select>
                        </div>

                        {/* User Selection (only for single user) */}
                        {formData.recipientType === 'single' && (
                            <div className="relative">
                                <label className="block text-sm font-medium text-gray-700 mb-1">
                                    User Email *
                                </label>
                                <input
                                    type="email"
                                    name="userEmail"
                                    value={formData.userEmail}
                                    onChange={handleInputChange}
                                    required
                                    className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    placeholder="Type user email to search..."
                                />
                                
                                {/* User suggestions dropdown */}
                                {filteredUsers.length > 0 && formData.userEmail && (
                                    <div className="absolute z-10 w-full mt-1 bg-white border border-gray-300 rounded-md shadow-lg max-h-48 overflow-y-auto">
                                        {filteredUsers.slice(0, 10).map(user => (
                                            <div
                                                key={user.id}
                                                onClick={() => selectUser(user)}
                                                className="px-3 py-2 hover:bg-gray-100 cursor-pointer border-b border-gray-100"
                                            >
                                                <div className="font-medium text-gray-900">{user.name || 'No Name'}</div>
                                                <div className="text-sm text-gray-600">{user.email}</div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Notification Title */}
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">
                                Title *
                            </label>
                            <input
                                type="text"
                                name="title"
                                value={formData.title}
                                onChange={handleInputChange}
                                required
                                maxLength="50"
                                className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="Enter notification title..."
                            />
                        </div>

                        {/* Notification Message */}
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">
                                Message *
                            </label>
                            <textarea
                                name="message"
                                value={formData.message}
                                onChange={handleInputChange}
                                required
                                maxLength="200"
                                rows="3"
                                className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="Enter notification message..."
                            />
                            <div className="text-xs text-gray-500 mt-1">
                                {formData.message.length}/200 characters
                            </div>
                        </div>

                        {/* Notification Type */}
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">
                                Type
                            </label>
                            <select
                                name="type"
                                value={formData.type}
                                onChange={handleInputChange}
                                className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                            >
                                <option value="system">System Announcement</option>
                                <option value="admin_message">Admin Message</option>
                                <option value="tournament_update">Tournament Update</option>
                                <option value="wallet_info">Wallet Information</option>
                                <option value="app_update">App Update</option>
                            </select>
                        </div>

                        {/* Priority */}
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">
                                Priority
                            </label>
                            <select
                                name="priority"
                                value={formData.priority}
                                onChange={handleInputChange}
                                className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                            >
                                <option value="low">Low</option>
                                <option value="normal">Normal</option>
                                <option value="high">High</option>
                                <option value="urgent">Urgent</option>
                            </select>
                        </div>

                        {/* Preview */}
                        <div className="bg-gray-50 p-4 rounded-md">
                            <h4 className="font-medium text-gray-700 mb-2">Preview:</h4>
                            <div className="bg-white p-3 rounded border border-gray-200">
                                <div className="font-semibold text-gray-900">{formData.title || 'Notification Title'}</div>
                                <div className="text-gray-600 text-sm mt-1">{formData.message || 'Notification message will appear here...'}</div>
                                <div className="text-xs text-gray-400 mt-2">
                                    Type: {formData.type} • Priority: {formData.priority}
                                </div>
                            </div>
                        </div>

                        {/* Status Message */}
                        {message && (
                            <div className={`p-3 rounded-md ${message.includes('✅') ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}`}>
                                {message}
                            </div>
                        )}

                        {/* Submit Button */}
                        <button
                            type="submit"
                            disabled={loading}
                            className={`w-full py-2 px-4 rounded-md font-medium ${
                                loading 
                                    ? 'bg-gray-400 cursor-not-allowed' 
                                    : 'bg-blue-600 hover:bg-blue-700'
                            } text-white transition-colors`}
                        >
                            {loading ? (
                                <span className="flex items-center justify-center">
                                    <div className="animate-spin rounded-full h-4 w-4 border-b-2 border-white mr-2"></div>
                                    Sending...
                                </span>
                            ) : (
                                `Send Notification ${formData.recipientType === 'all' ? 'to All Users' : ''}`
                            )}
                        </button>
                    </form>
                </Card>

                {/* Instructions */}
                <Card className="mt-6">
                    <h3 className="text-lg font-semibold text-gray-800 mb-4">📱 Real-time Notification System</h3>
                    <div className="space-y-3 text-sm text-gray-600">
                        <div className="flex items-start">
                            <span className="text-green-500 mr-2">✅</span>
                            <div>
                                <strong>Instant Delivery:</strong> Notifications appear as floating banners in the app immediately
                            </div>
                        </div>
                        <div className="flex items-start">
                            <span className="text-blue-500 mr-2">📱</span>
                            <div>
                                <strong>Push Notifications:</strong> Users receive system notifications even when app is closed
                            </div>
                        </div>
                        <div className="flex items-start">
                            <span className="text-purple-500 mr-2">🔔</span>
                            <div>
                                <strong>In-App Banners:</strong> Floating notifications appear at the top with swipe-to-dismiss
                            </div>
                        </div>
                        <div className="flex items-start">
                            <span className="text-orange-500 mr-2">💾</span>
                            <div>
                                <strong>Persistent Storage:</strong> All notifications are saved in the user's notification list
                            </div>
                        </div>
                    </div>
                </Card>
            </div>
        );
    }

    // ==========================
    // Main App Shell
    // ==========================
    function AdminShell() {
        const [activeTab, setActiveTab] = useState('dashboard');
        const [tokenRefreshed, setTokenRefreshed] = useState(false);
        const [userRole, setUserRole] = useState(null);
        const [userPermissions, setUserPermissions] = useState({});
        const [isMainAdmin, setIsMainAdmin] = useState(false);
        const { data: users, loading: usersLoading } = useCollection('users');

        // Check user role and permissions
        useEffect(() => {
            const checkUserRole = async () => {
                // Check for mini admin session first
                const miniAdminSession = sessionStorage.getItem('miniAdminSession');
                if (miniAdminSession) {
                    try {
                        const sessionData = JSON.parse(miniAdminSession);
                        setIsMainAdmin(false);
                        setUserRole('mini_admin');
                        setUserPermissions(sessionData.permissions || {});
                        return;
                    } catch (error) {
                        console.error('Error parsing mini admin session:', error);
                        sessionStorage.removeItem('miniAdminSession');
                    }
                }

                if (!auth.currentUser) return;

                try {
                    // Check if user is main admin (has admin custom claim)
                    const tokenResult = await auth.currentUser.getIdTokenResult(true);
                    if (tokenResult.claims.admin === true) {
                        setIsMainAdmin(true);
                        setUserRole('main_admin');
                        // Main admin has access to everything
                        const allPermissions = {
                            dashboard: true,
                            users: true,
                            wallet_requests: true,
                            tournaments: true,
                            live_joins: true,
                            support_tickets: true,
                            messages: true,
                            transactions: true,
                            game_profiles: true,
                            app_settings: true,
                            app_config: true,
                            admin_actions: true,
                            team_entries: true,
                            create_transaction_history: true,
                            create_mini_admin: true,
                            retention: true
                        };
                        setUserPermissions(allPermissions);
                        return;
                    }

                    // Check if user is mini admin
                    const adminRoleQuery = await db.collection('admin_roles')
                        .where('uid', '==', auth.currentUser.uid)
                        .where('isActive', '==', true)
                        .get();

                    if (!adminRoleQuery.empty) {
                        const miniAdminData = adminRoleQuery.docs[0].data();
                        setIsMainAdmin(false);
                        setUserRole('mini_admin');
                        setUserPermissions(miniAdminData.permissions || {});
                        console.log('Mini admin permissions loaded:', miniAdminData.permissions);
                    } else {
                        // User has admin claim but no mini admin role - treat as main admin
                        setIsMainAdmin(true);
                        setUserRole('main_admin');
                        const allPermissions = {
                            dashboard: true,
                            users: true,
                            wallet_requests: true,
                            tournaments: true,
                            live_joins: true,
                            support_tickets: true,
                            messages: true,
                            transactions: true,
                            game_profiles: true,
                            app_settings: true,
                            app_config: true,
                            admin_actions: true,
                            team_entries: true,
                            create_transaction_history: true,
                            create_mini_admin: true,
                            referrals: true,
                            retention: true
                        };
                        setUserPermissions(allPermissions);
                    }
                } catch (error) {
                    console.error('Error checking user role:', error);
                }
            };

            checkUserRole();

            // Listen for real-time permission updates
            const handlePermissionUpdate = (event) => {
                const { adminId, newPermissions } = event.detail;
                const miniAdminSession = sessionStorage.getItem('miniAdminSession');
                
                if (miniAdminSession) {
                    try {
                        const sessionData = JSON.parse(miniAdminSession);
                        if (sessionData.uid === adminId) {
                            // Update permissions in session and state
                            sessionData.permissions = newPermissions;
                            sessionStorage.setItem('miniAdminSession', JSON.stringify(sessionData));
                            setUserPermissions(newPermissions);
                            
                            // If current tab is no longer accessible, redirect to dashboard
                            if (!newPermissions[activeTab] && activeTab !== 'dashboard') {
                                setActiveTab('dashboard');
                            }
                        }
                    } catch (error) {
                        console.error('Error updating permissions:', error);
                    }
                }
            };

            window.addEventListener('permissionUpdate', handlePermissionUpdate);

            return () => {
                window.removeEventListener('permissionUpdate', handlePermissionUpdate);
            };
        }, [activeTab]);

        // Refresh admin token to get updated custom claims
        useEffect(() => {
            const refreshAdminToken = async () => {
                try {
                    if (auth.currentUser && !tokenRefreshed) {
                        console.log('Refreshing admin token to get updated custom claims...');
                        await auth.currentUser.getIdToken(true);
                        console.log('✅ Admin token refreshed successfully');
                        setTokenRefreshed(true);
                    }
                } catch (error) {
                    console.error('❌ Error refreshing admin token:', error);
                }
            };
            
            refreshAdminToken();
        }, [tokenRefreshed]);

        const renderContent = () => {
            // Check if user has permission to access the current tab
            const hasPermission = userPermissions[activeTab] || false;
            
            if (!hasPermission && userRole === 'mini_admin') {
                return (
                    <Card>
                        <div className="text-center py-12">
                            <div className="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                <svg className="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m0 0v2m0-2h2m-2 0H10m2-5V9m0 0V7m0 2h2m-2 0H10"></path>
                                </svg>
                            </div>
                            <h3 className="text-lg font-semibold text-white mb-2">Access Denied</h3>
                            <p className="text-gray-300 mb-4">You don't have permission to access this section.</p>
                            <p className="text-sm text-gray-400">Contact the main administrator to request access to "{activeTab.replace(/_/g, ' ')}".</p>
                        </div>
                    </Card>
                );
            }

            switch (activeTab) {
                case 'dashboard': return <Dashboard users={users} loading={usersLoading} />;
                case 'users': return <Users users={users} loading={usersLoading} />;
                case 'wallet_requests': return <WalletRequests />;
                case 'tournaments': return <Tournaments />;
                case 'live_joins': return <LiveJoins />;
                case 'support_tickets': return <SupportTickets />;
                case 'messages': return <Messages />;
                case 'transactions': return <Transactions />;
                case 'game_profiles': return <GameProfiles />;
                case 'app_settings': return <AppSettings />;
                case 'app_config': return <AppConfig />;
                case 'admin_actions': return <AdminActions />;
                case 'team_entries': return <TeamEntries />;
                case 'create_transaction_history': return <CreateTransactionHistory />;
                case 'send_notifications': return <SendNotifications />;
                case 'create_mini_admin': return <CreateMiniAdmin />;
                case 'referrals': return <ReferralManagement />;
                case 'retention': return <RetentionAdmin />;
                default: return <Dashboard users={users} loading={usersLoading} />;
            }
        };
        
        return (
            <div className="admin-panel flex min-h-screen">
                <aside className="sidebar w-64 p-6 flex flex-col flex-shrink-0">
                    <div className="flex items-center gap-3 mb-8">
                        <div className="w-12 h-12 bg-gradient-to-br from-cyan-400 to-teal-500 text-white flex items-center justify-center rounded-xl font-bold text-xl shadow-lg">
                            PC
                        </div>
                        <div>
                            <h1 className="admin-title text-xl mb-0">ProClash</h1>
                            <p className="admin-text-secondary text-sm">Admin Panel</p>
                        </div>
                    </div>
                    <nav className="flex flex-col gap-2">
                        {['Dashboard', 'Users', 'Wallet Requests', 'Tournaments', 'Live Joins', 'Support Tickets', 'Messages', 'Transactions', 'Game Profiles', 'App Settings', 'App Config', 'Admin Actions', 'Team Entries', 'Create Transaction History', 'Send Notifications', 'Create Mini Admin', 'Referrals', 'Retention'].filter(tab => {
                            const tabKey = tab.toLowerCase().replace(/ /g, '_');
                            // Show all tabs for main admin, only permitted tabs for mini admin
                            return isMainAdmin || userPermissions[tabKey] || tabKey === 'dashboard';
                        }).map(tab => (
                            <a href="#" key={tab} 
                               onClick={(e) => { e.preventDefault(); setActiveTab(tab.toLowerCase().replace(/ /g, '_')); }} 
                               className={`sidebar-link px-4 py-3 rounded-lg text-sm font-medium transition-all duration-300 flex items-center gap-3 ${activeTab === tab.toLowerCase().replace(/ /g, '_') ? 'active' : ''}`}>
                                <span className="w-2 h-2 rounded-full bg-current opacity-60"></span>
                                {tab}
                                {!isMainAdmin && userRole === 'mini_admin' && (
                                    <span className="ml-auto text-xs bg-blue-500 text-white px-2 py-0.5 rounded-full">Mini</span>
                                )}
                            </a>
                        ))}
                    </nav>
                    
                    <div className="mt-auto pt-6 border-t border-white/10">
                        <button 
                            onClick={() => firebase.auth().signOut()}
                            className="btn-secondary w-full text-sm py-2">
                            Sign Out
                        </button>
                    </div>
                </aside>
                <main className="flex-1 p-8 bg-gradient-to-br from-slate-900/50 to-slate-800/30">
                    <div className="max-w-7xl mx-auto">
                        {renderContent()}
                    </div>
                </main>
            </div>
        );
    }

    // Authentication Login Component
    function AuthLogin() {
        const [loginType, setLoginType] = useState('main'); // 'main' or 'mini'
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState('');
        const [formData, setFormData] = useState({
            username: '',
            password: ''
        });

        // Password hashing function (same as creation)
        const hashPassword = async (password) => {
            const encoder = new TextEncoder();
            const data = encoder.encode(password + 'proclash_salt_2024');
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        };

        const handleGoogleSignIn = async () => {
            setLoading(true);
            setError('');
            
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                provider.addScope('email');
                provider.addScope('profile');
                
                const result = await firebase.auth().signInWithPopup(provider);
                console.log('Google sign-in successful:', result.user.email);
                
                // The auth state change handler will verify admin claims
            } catch (error) {
                console.error('Google sign-in error:', error);
                setError('Failed to sign in with Google. Please try again.');
                setLoading(false);
            }
        };

        const handleInputChange = (e) => {
            const { name, value } = e.target;
            setFormData(prev => ({ ...prev, [name]: value }));
        };

        const handleMiniAdminLogin = async (e) => {
            e.preventDefault();
            setLoading(true);
            setError('');

            try {
                const hashedPassword = await hashPassword(formData.password);
                console.log('Login attempt:', {
                    username: formData.username.trim(),
                    hashedPassword: hashedPassword.substring(0, 10) + '...'
                });
                
                try {
                    // First check if user exists by username OR email (for backward compatibility)
                    let userCheckQuery = await db.collection('admin_roles')
                        .where('username', '==', formData.username.trim())
                        .where('role', '==', 'mini_admin')
                        .limit(1)
                        .get();

                    // If no username match, try email field (for records created with create_mini_admin.js)
                    if (userCheckQuery.empty) {
                        userCheckQuery = await db.collection('admin_roles')
                            .where('email', '==', formData.username.trim())
                            .where('role', '==', 'mini_admin')
                            .limit(1)
                            .get();
                    }

                    if (userCheckQuery.empty) {
                        console.log('No user found with username/email:', formData.username.trim());
                        setError('Invalid username or password');
                        setLoading(false);
                        return;
                    }

                    const userDoc = userCheckQuery.docs[0];
                    const userData = userDoc.data();
                    console.log('User found:', {
                        username: userData.username || userData.email,
                        hasPassword: !!userData.password,
                        isActive: userData.isActive,
                        status: userData.status
                    });

                    // Handle records created with create_mini_admin.js (no password field)
                    if (!userData.password) {
                        console.log('Legacy record without password - allowing login');
                        // For records created with create_mini_admin.js, skip password check
                    } else {
                        // Check password match for records with password
                        if (userData.password !== hashedPassword) {
                            console.log('Password mismatch');
                            setError('Invalid username or password');
                            setLoading(false);
                            return;
                        }
                    }

                    // Check account status (use isActive or status field)
                    const isActive = userData.isActive !== undefined ? userData.isActive : (userData.status === 'active');
                    if (!isActive) {
                        setError('Account is deactivated. Contact main admin.');
                        setLoading(false);
                        return;
                    }

                    // Check if account is locked
                    if (userData.lockedUntil && userData.lockedUntil.toDate() > new Date()) {
                        const unlockTime = userData.lockedUntil.toDate().toLocaleString();
                        setError(`Account is locked until ${unlockTime}`);
                        setLoading(false);
                        return;
                    }

                    // Update last login (if document has update capability)
                    try {
                        await db.collection('admin_roles').doc(userDoc.id).update({
                            lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                            loginAttempts: 0,
                            lockedUntil: null
                        });
                    } catch (updateError) {
                        console.log('Could not update login timestamp:', updateError.message);
                    }

                    // Create user object for mini admin
                    const mockUser = {
                        uid: userDoc.id,
                        email: userData.email,
                        displayName: userData.username || userData.email,
                        isMiniAdmin: true,
                        permissions: userData.permissions || {},
                        username: userData.username || userData.email
                    };

                    console.log('Login successful for:', mockUser.username);

                    // Store session and trigger login event
                    sessionStorage.setItem('miniAdminSession', JSON.stringify(mockUser));
                    window.dispatchEvent(new CustomEvent('miniAdminLogin', { detail: mockUser }));
                    return;
                } catch (firestoreError) {
                    console.error('Firestore authentication failed:', firestoreError);
                    setError('Database connection error. Please try again.');
                    setLoading(false);
                    return;
                }

                // Should not reach here
                setError('Invalid username or password');
                setLoading(false);
                return;

            } catch (error) {
                console.error('Mini admin login error:', error);
                setError('Login failed. Please try again.');
                setLoading(false);
            }
        };

        return (
            <div className="admin-panel min-h-screen flex items-center justify-center">
                <div className="admin-card w-full max-w-md p-8">
                    <div className="flex flex-col items-center mb-8">
                        <div className="w-16 h-16 bg-gradient-to-br from-cyan-400 to-teal-500 text-white flex items-center justify-center rounded-2xl font-bold text-2xl mb-4 shadow-xl">
                            PC
                        </div>
                        <h1 className="admin-title text-3xl mb-2">ProClash Admin</h1>
                        <p className="admin-text-secondary text-center">Sign in to access the admin panel</p>
                    </div>

                    {/* Login Type Selector */}
                    <div className="flex mb-6 bg-slate-800 rounded-lg p-1">
                        <button
                            onClick={() => setLoginType('main')}
                            className={`flex-1 py-2 px-4 rounded-md text-sm font-medium transition-all ${
                                loginType === 'main' 
                                    ? 'bg-cyan-500 text-white shadow-md' 
                                    : 'text-gray-400 hover:text-white'
                            }`}
                        >
                            Main Admin
                        </button>
                        <button
                            onClick={() => setLoginType('mini')}
                            className={`flex-1 py-2 px-4 rounded-md text-sm font-medium transition-all ${
                                loginType === 'mini' 
                                    ? 'bg-cyan-500 text-white shadow-md' 
                                    : 'text-gray-400 hover:text-white'
                            }`}
                        >
                            Mini Admin
                        </button>
                    </div>

                    <div className="space-y-4">
                        {loginType === 'main' ? (
                            <button
                                onClick={handleGoogleSignIn}
                                disabled={loading}
                                className="w-full bg-white hover:bg-gray-50 text-gray-900 font-medium py-3 px-4 rounded-lg border border-gray-300 flex items-center justify-center space-x-3 transition-colors disabled:opacity-50"
                            >
                                {loading ? (
                                    <div className="spinner w-5 h-5"></div>
                                ) : (
                                    <>
                                        <svg className="w-5 h-5" viewBox="0 0 24 24">
                                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                                        </svg>
                                        <span>Continue with Google</span>
                                    </>
                                )}
                            </button>
                        ) : (
                            <form onSubmit={handleMiniAdminLogin} className="space-y-4">
                                <div>
                                    <label className="block text-white text-sm font-medium mb-2">Username</label>
                                    <input
                                        type="text"
                                        name="username"
                                        value={formData.username}
                                        onChange={handleInputChange}
                                        className="admin-input w-full px-3 py-2 rounded-lg"
                                        required
                                    />
                                </div>
                                <div>
                                    <label className="block text-white text-sm font-medium mb-2">Password</label>
                                    <input
                                        type="password"
                                        name="password"
                                        value={formData.password}
                                        onChange={handleInputChange}
                                        className="admin-input w-full px-3 py-2 rounded-lg"
                                        required
                                    />
                                </div>
                                <button
                                    type="submit"
                                    disabled={loading}
                                    className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-600 text-white font-medium py-3 px-4 rounded-lg transition-colors"
                                >
                                    {loading ? <div className="spinner w-5 h-5 mx-auto"></div> : 'Sign In'}
                                </button>
                            </form>
                        )}
                        
                        {error && (
                            <div className="bg-red-500/10 border border-red-500/20 rounded-lg p-4">
                                <p className="text-red-400 text-sm text-center">{error}</p>
                            </div>
                        )}
                    </div>

                    <div className="text-center mt-6">
                        <p className="text-gray-400 text-sm">
                            {loginType === 'main' 
                                ? 'Sign in with your Google account to access the admin panel' 
                                : 'Enter your mini admin credentials to access your assigned sections'
                            }
                        </p>
                    </div>
                </div>
            </div>
        );
    }

    // Main App Component
    function App() {
        const [user, setUser] = useState(null);
        const [loading, setLoading] = useState(true);

        useEffect(() => {
            // Check for existing mini admin session
            const miniAdminSession = sessionStorage.getItem('miniAdminSession');
            if (miniAdminSession) {
                try {
                    const sessionData = JSON.parse(miniAdminSession);
                    setUser(sessionData);
                    setLoading(false);
                    return;
                } catch (error) {
                    console.error('Error parsing mini admin session:', error);
                    sessionStorage.removeItem('miniAdminSession');
                }
            }

            // Listen for mini admin login events
            const handleMiniAdminLogin = (event) => {
                setUser(event.detail);
                setLoading(false);
            };

            window.addEventListener('miniAdminLogin', handleMiniAdminLogin);

            // Firebase auth state listener for main admins
            const unsubscribe = auth.onAuthStateChanged(async (firebaseUser) => {
                if (firebaseUser) {
                    try {
                        const idTokenResult = await firebaseUser.getIdTokenResult();
                        if (idTokenResult.claims.admin) {
                            setUser({
                                ...firebaseUser,
                                isMainAdmin: true,
                                permissions: null // Main admin has all permissions
                            });
                        } else {
                            console.log('User does not have admin privileges');
                            await auth.signOut();
                            setUser(null);
                        }
                    } catch (error) {
                        console.error('Error checking admin claims:', error);
                        setUser(null);
                    }
                } else {
                    setUser(null);
                }
                setLoading(false);
            });

            return () => {
                unsubscribe();
                window.removeEventListener('miniAdminLogin', handleMiniAdminLogin);
            };
        }, []);

        if (loading) {
            return (
                <div className="admin-panel min-h-screen flex items-center justify-center">
                    <div className="spinner w-12 h-12"></div>
                </div>
            );
        }

        if (!user) {
            return <AuthLogin />;
        }

        return <AdminShell user={user} />;
    }

    // Render the app
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
</script>
