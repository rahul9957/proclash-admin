<script type="text/babel">
    const { useEffect, useState, useMemo, useCallback } = React;

    // ==========================
    // Firebase SDK Setup
    // ==========================
    const firebaseConfig = {
        apiKey: "AIzaSyCK90vHNN8o_GE6lmabxbBC7IsSTNPVGW4",
        authDomain: "proclashtournament.firebaseapp.com",
        projectId: "proclashtournament",
        storageBucket: "proclashtournament.firebasestorage.app",
        messagingSenderId: "113573480845",
        appId: "1:113573480845:web:642bb50440334163fa95c4",
        measurementId: "G-7KQFTYSWNB"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    const auth = firebase.auth();
    const { serverTimestamp, increment } = firebase.firestore.FieldValue;

    // ==========================
    // Reusable UI Components
    // ==========================
    function Card({ children, className }) {
        return <div className={`admin-card p-6 ${className || ''}`}>{children}</div>;
    }

    function StatCard({ label, value, icon }) {
        return (
            <Card className="hover:scale-105 transition-transform duration-300">
                <div className="flex items-center gap-4">
                    <div className="flex-shrink-0 p-3 rounded-xl bg-gradient-to-br from-cyan-500/20 to-teal-500/20">
                        {React.cloneElement(icon, { className: 'h-6 w-6 text-cyan-400' })}
                    </div>
                    <div>
                        <p className="admin-text-secondary text-sm font-medium mb-1">{label}</p>
                        <p className="admin-text text-2xl font-bold">{value}</p>
                    </div>
                </div>
            </Card>
        );
    }

    function Table({ headers, children }) {
        return (
            <div className="admin-card overflow-hidden">
                <div className="overflow-x-auto">
                    <table className="min-w-full text-sm">
                        <thead>
                            <tr className="border-b border-white/10 bg-gradient-to-r from-slate-800/50 to-slate-700/50">
                                {headers.map(h => <th key={h} className="py-4 px-6 text-left font-semibold text-white">{h}</th>)}
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-white/10">{children}</tbody>
                    </table>
                </div>
            </div>
        );
    }
    
    function Button({ children, onClick, variant = 'primary', disabled = false, className = '', type = 'button' }) {
        const baseStyles = "px-4 py-2 rounded-lg font-semibold text-sm transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-800 disabled:opacity-50 disabled:cursor-not-allowed";
        const variants = {
            primary: "btn-primary",
            success: "btn-success",
            danger: "btn-danger",
            secondary: "btn-secondary"
        };
        return <button type={type} onClick={onClick} disabled={disabled} className={`${baseStyles} ${variants[variant]} ${className}`}>{children}</button>;
    }
    
    function TextInput({ value, onChange, placeholder, type = 'text', name, required = false}) {
        return <input type={type} name={name} value={value} onChange={onChange} placeholder={placeholder} required={required} className="admin-input w-full" />;
    }
    
    function SectionHeader({ title, children }) {
        return (
            <div className="flex justify-between items-center mb-6">
                <h2 className="admin-subtitle text-2xl">{title}</h2>
                <div>{children}</div>
            </div>
        );
    }

    // Custom hook for fetching Firestore collections
    function useCollection(collectionName, orderByField, orderDirection = 'desc') {
        const [data, setData] = useState([]);
        const [loading, setLoading] = useState(true);

        useEffect(() => {
            let query = db.collection(collectionName);
            const finalOrderByField = orderByField || firebase.firestore.FieldPath.documentId();
            query = query.orderBy(finalOrderByField, orderDirection);
            
            const unsubscribe = query.onSnapshot(snapshot => {
                const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                setData(items);
                setLoading(false);
            }, error => {
                console.error(`Error fetching ${collectionName}:`, error);
                setLoading(false);
            });

            return () => unsubscribe();
        }, [collectionName, orderByField, orderDirection]);

        return { data, loading };
    }

    // ==========================
    // Admin Notepad Component
    // ==========================
    function AdminNotepad() {
        const [notes, setNotes] = useState('');
        const [loading, setLoading] = useState(true);
        const [saving, setSaving] = useState(false);
        const [lastSaved, setLastSaved] = useState(null);

        // Load notes from Firestore on component mount
        useEffect(() => {
            const loadNotes = async () => {
                try {
                    const doc = await db.collection('admin_config').doc('notepad').get();
                    if (doc.exists) {
                        const data = doc.data();
                        setNotes(data.notes || '');
                        setLastSaved(data.lastSaved?.toDate());
                    }
                } catch (error) {
                    console.error('Error loading admin notes:', error);
                } finally {
                    setLoading(false);
                }
            };
            loadNotes();
        }, []);

        // Auto-save functionality with debounce
        useEffect(() => {
            if (!loading && notes !== '') {
                const saveTimeout = setTimeout(async () => {
                    await saveNotes();
                }, 2000); // Auto-save after 2 seconds of no typing

                return () => clearTimeout(saveTimeout);
            }
        }, [notes, loading]);

        const saveNotes = async () => {
            setSaving(true);
            try {
                await db.collection('admin_config').doc('notepad').set({
                    notes: notes,
                    lastSaved: serverTimestamp(),
                    updatedBy: auth.currentUser?.email || 'Unknown Admin'
                }, { merge: true });
                setLastSaved(new Date());
            } catch (error) {
                console.error('Error saving admin notes:', error);
                alert('Failed to save notes. Please try again.');
            } finally {
                setSaving(false);
            }
        };

        const handleNotesChange = (e) => {
            setNotes(e.target.value);
        };

        const handleManualSave = async () => {
            await saveNotes();
        };

        return (
            <Card>
                <div className="flex justify-between items-center mb-4">
                    <h3 className="text-lg font-bold text-white">📝 Admin Notepad</h3>
                    <div className="flex items-center gap-2">
                        {saving && <div className="spinner"></div>}
                        {lastSaved && (
                            <span className="text-xs text-gray-300">
                                Last saved: {lastSaved.toLocaleString()}
                            </span>
                        )}
                        <Button onClick={handleManualSave} disabled={saving} variant="primary">
                            {saving ? 'Saving...' : 'Save Now'}
                        </Button>
                    </div>
                </div>
                
                <div className="bg-yellow-900/30 border border-yellow-600/50 rounded-lg p-3 mb-4">
                    <div className="flex items-center gap-2">
                        <svg className="w-4 h-4 text-yellow-400" fill="currentColor" viewBox="0 0 20 20">
                            <path fillRule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clipRule="evenodd" />
                        </svg>
                        <span className="text-sm font-medium text-yellow-200">
                            Persistent Notes - Auto-saves every 2 seconds, never deleted automatically
                        </span>
                    </div>
                </div>

                {loading ? (
                    <div className="flex items-center justify-center py-8">
                        <div className="spinner mr-2"></div>
                        <span className="text-gray-300">Loading notes...</span>
                    </div>
                ) : (
                    <textarea
                        value={notes}
                        onChange={handleNotesChange}
                        placeholder="Add your admin notes, tasks, reminders here... 
• This notepad is persistent and shared among all admins
• Notes are auto-saved every 2 seconds
• Use this for tracking tasks, important reminders, or any admin notes
• Content is never automatically deleted"
                        className="w-full h-64 p-4 admin-input resize-none font-mono text-sm"
                        style={{ lineHeight: '1.5' }}
                    />
                )}
                
                <div className="mt-3 text-xs text-gray-300 flex justify-between items-center">
                    <span>Characters: {notes.length}</span>
                    <span>
                        {saving ? (
                            <span className="text-blue-400">💾 Saving...</span>
                        ) : (
                            <span className="text-green-400">✅ Saved</span>
                        )}
                    </span>
                </div>
            </Card>
        );
    }

    // ==========================
    // Admin Panel Sections
    // ==========================

    function Dashboard({ users, loading: usersLoading }) {
        const { data: tournaments } = useCollection('tournaments', 'createdAt');
        const { data: walletRequests } = useCollection('wallet_requests', 'timestamp');
        const { data: supportTickets } = useCollection('support_tickets', 'updatedAt');

        const pendingRequests = useMemo(() => walletRequests.filter(r => r.status === 'pending').length, [walletRequests]);
        const activeTournaments = useMemo(() => tournaments.filter(t => t.status !== 'completed').length, [tournaments]);
        // Count tickets that are not resolved (covers both 'new' and 'open')
        const pendingSupportTickets = useMemo(() => supportTickets.filter(t => t.status !== 'resolved').length, [supportTickets]);
        
        // Calculate total wallet balance across all users
        const totalWalletBalance = useMemo(() => {
            return users.reduce((total, user) => {
                const balance = user.walletBalance || 0;
                return total + balance;
            }, 0);
        }, [users]);

        // Calculate total withdrawal amount (both completed and pending)
        const totalWithdrawalAmount = useMemo(() => {
            return walletRequests
                .filter(r => r.requestType === 'withdrawal')
                .reduce((total, request) => total + (request.amount || 0), 0);
        }, [walletRequests]);

        return (
            <div className="space-y-8">
                <div className="mb-8">
                    <h1 className="admin-title text-4xl mb-2">Dashboard</h1>
                    <p className="admin-text-secondary">Welcome to ProClash Admin Panel - Monitor your tournament platform</p>
                </div>
                
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <StatCard label="Total Users" value={users.length} icon={<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M15 21a6 6 0 00-9-5.197" /></svg>} />

    function Users({ users, loading }) {
        const [search, setSearch] = useState('');
        const [editableBalances, setEditableBalances] = useState({});

        useEffect(() => {
            if (users.length > 0) {
                setEditableBalances(prevBalances => {
                    const newBalances = { ...prevBalances };
                    users.forEach(user => {
                        if (newBalances[user.id] === undefined) { 
                            newBalances[user.id] = user.walletBalance != null ? user.walletBalance.toString() : '0';
                        }
                    });
                    return newBalances;
                });
            }
        }, [users]);

        const handleBalanceChange = (id, value) => {
            setEditableBalances(prev => ({ ...prev, [id]: value }));
        };

        const handleBalanceSave = async (id) => {
            const newBalance = parseFloat(editableBalances[id]);
            if (isNaN(newBalance)) {
                alert('Please enter a valid number for the balance.');
                return;
            }
            try {
                // Get current user data to check existing balance structure
                const userDoc = await db.collection('users').doc(id).get();
                const userData = userDoc.data();
                
                // Check if user has new balance fields
                const hasNewBalanceFields = userData.hasOwnProperty('depositBalance') || userData.hasOwnProperty('winningBalance');
                
                if (hasNewBalanceFields) {
                    // User has new balance system - update both systems for consistency
                    const currentDeposit = userData.depositBalance || 0;
                    const currentWinning = userData.winningBalance || 0;
                    const currentTotal = currentDeposit + currentWinning;
                    
                    // Calculate the difference and add it to depositBalance (safer option)
                    const difference = newBalance - currentTotal;
                    
                    await db.collection('users').doc(id).update({ 
                        walletBalance: newBalance, // Legacy field
                        depositBalance: firebase.firestore.FieldValue.increment(difference), // Add difference to deposit
                        lastUpdatedBy: 'admin',
                        lastUpdatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    console.log(`💰 BALANCE SYNC: Updated user ${id} - New Total: 🪙${newBalance}, Added to Deposit: 🪙${difference}`);
                    alert(`✅ Wallet balance updated successfully!\n🪙 Total: ${newBalance}\n💰 Added to Deposit Balance: ${difference}`);
                } else {
                    // User has legacy system only - just update walletBalance
                    await db.collection('users').doc(id).update({ 
                        walletBalance: newBalance,
                        lastUpdatedBy: 'admin',
                        lastUpdatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    console.log(`🔄 LEGACY BALANCE: Updated user ${id} - Total: 🪙${newBalance}`);
                    alert(`✅ Legacy wallet balance updated successfully!\n🪙 Total: ${newBalance}`);
                }
            } catch (error) {
                console.error('Error updating wallet balance:', error);
                alert(`Failed to update balance. Error: ${error.message}`);
            }
        };

        const sortedUsers = useMemo(() => {
            return [...users].sort((a, b) => {
                const dateA = a.createdAt?.seconds || 0;
                const dateB = b.createdAt?.seconds || 0;
                return dateB - dateA;
            });
        }, [users]);

        const filteredUsers = useMemo(() => {
            const sourceUsers = sortedUsers;
            if (!search) return sourceUsers;
            return sourceUsers.filter(u => 
                (u.name || '').toLowerCase().includes(search.toLowerCase()) ||
                (u.email || '').toLowerCase().includes(search.toLowerCase())
            );
        }, [sortedUsers, search]);

        // Function to sync balance for users with mismatch
        const handleSyncBalance = async (userId) => {
            try {
                const userDoc = await db.collection('users').doc(userId).get();
                const userData = userDoc.data();
                
                const legacyBalance = userData.walletBalance || 0;
                const depositBalance = userData.depositBalance || 0;
                const winningBalance = userData.winningBalance || 0;
                const calculatedTotal = depositBalance + winningBalance;
                
                if (legacyBalance !== calculatedTotal) {
                    // There's a mismatch - fix it by updating depositBalance
                    const difference = legacyBalance - calculatedTotal;
                    
                    await db.collection('users').doc(userId).update({
                        depositBalance: firebase.firestore.FieldValue.increment(difference),
                        lastSyncedBy: 'admin',
                        lastSyncedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    console.log(`🔄 BALANCE SYNCED for ${userData.email}: Legacy=${legacyBalance}, Calculated=${calculatedTotal}, Fixed difference=${difference}`);
                    alert(`✅ Balance synced successfully!\n🪙 Legacy Balance: ${legacyBalance}\n💰 New Total: ${legacyBalance}\n🔧 Fixed difference: ${difference}`);
                } else {
                    alert(`✅ Balance already in sync!\n🪙 Total: ${legacyBalance}`);
                }
            } catch (error) {
                console.error('Error syncing balance:', error);
                alert(`Failed to sync balance. Error: ${error.message}`);
            }
        };

        // Function to sync all users with balance mismatches
        const handleSyncAllBalances = async () => {
            const usersWithMismatch = filteredUsers.filter(user => {
                const legacyBalance = user.walletBalance || 0;
                const depositBalance = user.depositBalance || 0;
                const winningBalance = user.winningBalance || 0;
                const calculatedTotal = depositBalance + winningBalance;
                return legacyBalance !== calculatedTotal;
            });
            
            if (usersWithMismatch.length === 0) {
                alert('✅ All users are already in sync!');
                return;
            }
            
            if (!confirm(`Found ${usersWithMismatch.length} users with balance mismatches. Sync all?`)) {
                return;
            }
            
            let successCount = 0;
            let errorCount = 0;
            
            for (const user of usersWithMismatch) {
                try {
                    const legacyBalance = user.walletBalance || 0;
                    const depositBalance = user.depositBalance || 0;
                    const winningBalance = user.winningBalance || 0;
                    const calculatedTotal = depositBalance + winningBalance;
                    const difference = legacyBalance - calculatedTotal;
                    
                    await db.collection('users').doc(user.id).update({
                        depositBalance: firebase.firestore.FieldValue.increment(difference),
                        lastSyncedBy: 'admin_bulk',
                        lastSyncedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    console.log(`🔄 BULK SYNC: ${user.email} - Fixed difference: ${difference}`);
                    successCount++;
                } catch (error) {
                    console.error(`Error syncing ${user.email}:`, error);
                    errorCount++;
                }
            }
            
            alert(`✅ Bulk sync completed!\n✅ Success: ${successCount}\n❌ Errors: ${errorCount}`);
        };

        return (
            <Card>
                <SectionHeader title="Users Management">
                    <div className="flex gap-4 items-center">
                        <TextInput value={search} onChange={e => setSearch(e.target.value)} placeholder="Search by name or email..."/>
                        <Button onClick={handleSyncAllBalances} className="bg-purple-600 hover:bg-purple-700 whitespace-nowrap">
                            🔄 Sync All Mismatches
                        </Button>
                    </div>
                </SectionHeader>
                {loading ? <div className="spinner mx-auto"></div> :
                <Table headers={['Name', 'Email', 'Legacy Balance', 'Balance Breakdown', 'Joined', 'Actions']}>
                    {filteredUsers.map(user => {
                        const joinedTimestamp = user.createdAt || user.joinedAt;
                        const depositBalance = user.depositBalance || 0;
                        const winningBalance = user.winningBalance || 0;
                        const calculatedTotal = depositBalance + winningBalance;
                        const legacyBalance = user.walletBalance || 0;
                        const isInSync = legacyBalance === calculatedTotal;
                        
                        return (
                            <tr key={user.id}>
                                <td className="py-2 px-3 text-white">{user.name || 'N/A'}</td>
                                <td className="py-2 px-3 text-white">{user.email || 'N/A'}</td>
                                <td className="py-2 px-3">
                                    <TextInput 
                                        type="number" 
                                        value={editableBalances[user.id] || ''} 
                                        onChange={e => handleBalanceChange(user.id, e.target.value)} 
                                        placeholder="0.00"
                                    />
                                </td>
                                <td className="py-2 px-3">
                                    <div className={`text-sm ${isInSync ? 'text-green-400' : 'text-red-400'}`}>
                                        <div>💰 Deposit: 🪙{depositBalance}</div>
                                        <div>🏆 Winning: 🪙{winningBalance}</div>
                                        <div className="font-bold">📊 Total: 🪙{calculatedTotal}</div>
                                        {!isInSync && <div className="text-red-300">⚠️ Mismatch!</div>}
                                    </div>
                                </td>
                                <td className="py-2 px-3 text-white">{joinedTimestamp?.seconds ? new Date(joinedTimestamp.seconds * 1000).toLocaleDateString() : 'N/A'}</td>
                                <td className="py-2 px-3">
                                    <div className="flex gap-2">
                                        <Button onClick={() => handleBalanceSave(user.id)}>Save</Button>
                                        <Button onClick={() => handleSyncBalance(user.id)} className="bg-orange-600 hover:bg-orange-700">Sync</Button>
                                    </div>
                                </td>
                            </tr>
                        );
                    })}
                </Table>}
            </Card>
        );
    }

    function WalletRequests() {
        const { data: requests, loading } = useCollection('wallet_requests', 'timestamp');
        const [users, setUsers] = useState({});
        const [filter, setFilter] = useState('pending');
        const [actionLoading, setActionLoading] = useState({});

        useEffect(() => {
            const userIds = [...new Set(requests.map(r => r.userId).filter(Boolean))];
            if (userIds.length > 0) {
                const userPromises = userIds.map(id => db.collection('users').doc(id).get());
                Promise.all(userPromises).then(userDocs => {
                    const usersMap = userDocs.reduce((acc, doc) => {
                        if (doc.exists) acc[doc.id] = doc.data();
                        return acc;
                    }, {});
                    setUsers(usersMap);
                });
            }
        }, [requests]);

        const handleAction = async (req, action) => {
            if (!window.confirm(`Are you sure you want to ${action} this request?`)) return;

            setActionLoading(prev => ({ ...prev, [req.id]: true }));
            const reqRef = db.collection('wallet_requests').doc(req.id);
            const userRef = db.collection('users').doc(req.userId);
            
            // Define newStatus outside transaction scope to avoid ReferenceError
            const newStatus = action === 'approve' ? 'approved' : 'rejected';

            try {
                await db.runTransaction(async (transaction) => {
                    const reqDoc = await transaction.get(reqRef);
                    if (!reqDoc.exists || reqDoc.data().status !== 'pending') throw "Request already processed or not found!";

                    if (action === 'approve') {
                        const userDoc = await transaction.get(userRef);
                        if (!userDoc.exists) throw "User not found!";

                        if (req.requestType === 'deposit') {
                            // Deposits go to depositBalance (non-withdrawable)
                            transaction.update(userRef, { 
                                depositBalance: increment(req.amount),
                                walletBalance: increment(req.amount), // Keep for backward compatibility
                                wallet: increment(req.amount) // Legacy field
                            });
                        } else if (req.requestType === 'withdrawal') {
                            // Withdrawals can only come from winningBalance
                            const userData = userDoc.data();
                            const currentWinningBalance = userData.winningBalance || 0;
                            const currentTotalBalance = userData.walletBalance || 0;
                            
                            if (currentWinningBalance < req.amount) {
                                throw `Insufficient winning balance for withdrawal. Available: 🪙${currentWinningBalance}, Requested: 🪙${req.amount}`;
                            }
                            
                            transaction.update(userRef, { 
                                winningBalance: increment(-req.amount),
                                walletBalance: increment(-req.amount), // Keep for backward compatibility
                                wallet: increment(-req.amount) // Legacy field
                            });
                        }
                    }
                    
                    transaction.update(reqRef, { 
                        status: newStatus, 
                        processedAt: serverTimestamp(),
                        processedBy: auth.currentUser?.email || 'Admin'
                    });

                    // Create transaction record when processing wallet request
                    if (action === 'approve') {
                        const txnId = req.transactionId || db.collection('transactions').doc().id;
                        const transactionData = {
                            userId: req.userId,
                            amount: req.requestType === 'deposit' ? req.amount : -req.amount,
                            type: req.requestType,
                            status: 'completed',
                            timestamp: serverTimestamp(),
                            createdAt: serverTimestamp(),
                            description: `${req.requestType.charAt(0).toUpperCase() + req.requestType.slice(1)} processed by admin`,
                            processedBy: auth.currentUser?.email || 'Admin'
                        };

                        // Add to global transactions collection
                        const globalTransactionRef = db.collection('transactions').doc(txnId);
                        transaction.set(globalTransactionRef, transactionData);
                        
                        // Add to user's wallet_transactions subcollection
                        const walletTransactionRef = db.collection('users').doc(req.userId).collection('wallet_transactions').doc(txnId);
                        transaction.set(walletTransactionRef, transactionData);

                        console.log(`💳 Transaction record created for ${req.requestType}: ${txnId}`);
                    }
                });

                // Create notification for user about wallet request status change
                const user = users[req.userId];
                if (user) {
                    const notificationTitle = req.requestType === 'deposit' ? 
                        (action === 'approve' ? 'Deposit Approved!' : 'Deposit Rejected') :
                        (action === 'approve' ? 'Withdrawal Approved!' : 'Withdrawal Rejected');
                    
                    const notificationMessage = req.requestType === 'deposit' ?
                        (action === 'approve' ? `Your deposit of 🪙${req.amount} has been approved and added to your wallet` :
                         `Your deposit request of 🪙${req.amount} has been rejected`) :
                        (action === 'approve' ? `Your withdrawal of 🪙${req.amount} has been approved and processed` :
                         `Your withdrawal request of 🪙${req.amount} has been rejected`);
                    
                    // Create notification in Firestore (will trigger push notification)
                    await db.collection('notifications').add({
                        userId: req.userId,
                        title: notificationTitle,
                        message: notificationMessage,
                        type: 'wallet_request',
                        data: {
                            requestId: req.id,
                            requestType: req.requestType,
                            amount: req.amount,
                            status: newStatus
                        },
                        isRead: false,
                        createdAt: serverTimestamp()
                    });

                    console.log(`🔔 Wallet request notification created for user ${req.userId}: ${notificationTitle}`);
                }

                // Trigger real-time event for user apps
                window.dispatchEvent(new CustomEvent('walletRequestUpdate', {
                    detail: {
                        requestId: req.id,
                        userId: req.userId,
                        requestType: req.requestType,
                        amount: req.amount,
                        newStatus: newStatus,
                        timestamp: new Date().toISOString(),
                        processedBy: auth.currentUser?.email || 'Admin'
                    }
                }));

                // Show success notification
                const notification = document.createElement('div');
                notification.className = 'fixed top-4 right-4 bg-green-500 text-white px-4 py-2 rounded-lg shadow-lg z-50';
                const actionText = action === 'approve' ? 'approved' : 'rejected';
                const balanceText = action === 'approve' ? ' & wallet balance updated' : '';
                const transactionText = action === 'approve' ? ' & transaction record created' : '';
                notification.innerHTML = `✅ ${req.requestType.charAt(0).toUpperCase() + req.requestType.slice(1)} request ${actionText}${balanceText}${transactionText}!`;
                document.body.appendChild(notification);
                setTimeout(() => notification.remove(), 4000);
            } catch (error) {
                console.error('Error processing wallet request:', error);
                
                // More detailed error handling
                let errorMessage = 'Unknown error occurred';
                if (typeof error === 'string') {
                    errorMessage = error;
                } else if (error.message) {
                    errorMessage = error.message;
                } else if (error.code) {
                    errorMessage = `Firestore Error: ${error.code}`;
                }
                
                alert(`❌ Error processing ${req.requestType} request: ${errorMessage}`);
            } finally {
                setActionLoading(prev => ({ ...prev, [req.id]: false }));
            }
        };
        
        const filteredRequests = useMemo(() => requests.filter(r => r.status === filter), [requests, filter]);

        return (
            <Card>
                <SectionHeader title="Wallet Requests">
                    <select value={filter} onChange={e => setFilter(e.target.value)} className="admin-input text-sm">
                        <option value="pending">Pending</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected</option>
                    </select>
                </SectionHeader>
                {loading ? <div className="spinner mx-auto"></div> :
                 <Table headers={['User', 'Email', 'Type', 'Amount (Coins)', 'UTR/Details', 'Date', 'Actions']}>
                    {filteredRequests.map(req => (
                        <tr key={req.id}>
                            <td className="py-2 px-3 text-white">{users[req.userId]?.name || req.userId}</td>
                            <td className="py-2 px-3 text-white">{users[req.userId]?.email || 'N/A'}</td>
                            <td className="py-2 px-3"><span className={`px-2 py-0.5 text-xs font-semibold rounded-full ${req.requestType === 'deposit' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}`}>{req.requestType === 'deposit' ? 'Deposit' : 'Withdrawal'}</span></td>
                            <td className="py-2 px-3 font-medium text-white">🪙 {Math.round(req.amount)}</td>
                            <td className="py-2 px-3 text-gray-300">{req.utr || 'N/A'}</td>
                            <td className="py-2 px-3 text-gray-300">{req.timestamp?.seconds ? new Date(req.timestamp.seconds * 1000).toLocaleString() : 'N/A'}</td>
                            {/* BUG FIX: Added action buttons which were missing from the original code's table view */}
                            <td className="py-2 px-3">
                                {req.status === 'pending' && (
                                    <div className="flex gap-2">
                                        <Button 
                                            variant="success" 
                                            onClick={() => handleAction(req, 'approve')}
                                            disabled={actionLoading[req.id]}
                                        >
                                            {actionLoading[req.id] ? <div className="spinner"></div> : 'Approve'}
                                        </Button>
                                        <Button 
                                            variant="danger" 
                                            onClick={() => handleAction(req, 'reject')}
                                            disabled={actionLoading[req.id]}
                                        >
                                            {actionLoading[req.id] ? <div className="spinner"></div> : 'Reject'}
                                        </Button>
                                    </div>
                                )}
                            </td>
                        </tr>
                    ))}
                </Table>}
            </Card>
        );
    }

                // Calculate teamSize based on mode
                let teamSize = 1; // Default for Solo
                if (formData.mode === 'Team (2 Players)') {
                    teamSize = 2;
                } else if (formData.mode === 'Team (4 Players)') {
                    teamSize = 4;
                }

                const newTournament = {
                    title: formData.title,
                    game: formData.game,
                    description: formData.description,
                    imageUrl: formData.imageUrl,
                    date: firebase.firestore.Timestamp.fromDate(new Date(formData.date)),
                    maxParticipants: parseInt(formData.maxParticipants, 10) || 0,
                    prizePool: parseInt(formData.prizePool, 10) || 0,
                    entryFee: parseInt(formData.entryFee, 10) || 0,
                    rules: formData.rules.split('\n').filter(rule => rule.trim() !== ''),
                    status: formData.status,
                    mode: formData.mode,
                    teamSize: teamSize, // Add teamSize field
                    currentParticipants: 0,
                    isPublic: true, // Ensure tournaments are public for user app
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp(),
                };
                await db.collection('tournaments').add(newTournament);
                alert('Tournament created successfully!');
                onFormClose();
            } catch (error) {
                console.error("Error creating tournament: ", error);
                alert(`Failed to create tournament. Error: ${error.message}`);
            } finally {
                setLoading(false);
            }
        };

        return (
            <Card className="my-6 border-t pt-6">
                <h3 className="text-lg font-bold mb-4">Create New Tournament</h3>
                <form onSubmit={handleSubmit} className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <TextInput name="title" value={formData.title} onChange={handleChange} placeholder="Tournament Title" required />
                    <TextInput name="game" value={formData.game} onChange={handleChange} placeholder="Game Name (e.g., Call of Duty)" required />
                    <TextInput name="imageUrl" value={formData.imageUrl} onChange={handleChange} placeholder="Image URL" />
                    <TextInput type="datetime-local" name="date" value={formData.date} onChange={handleChange} required />
                    <TextInput type="number" name="maxParticipants" value={formData.maxParticipants} onChange={handleChange} placeholder="Slots / Max Participants" required />
                    <TextInput type="number" name="prizePool" value={formData.prizePool} onChange={handleChange} placeholder="Prize Pool (₹)" required />
                    <TextInput type="number" name="entryFee" value={formData.entryFee} onChange={handleChange} placeholder="Entry Fee (₹)" required />
                    <select name="status" value={formData.status} onChange={handleChange} className="admin-input w-full text-sm">
                        <option value="Upcoming">Upcoming</option>
                        <option value="Published">Published</option>
                    </select>
                    <select name="mode" value={formData.mode} onChange={handleChange} className="admin-input w-full text-sm">
                        <option value="Solo">Solo</option>
                        <option value="Team (2 Players)">Team (2 Players)</option>
                        <option value="Team (4 Players)">Team (4 Players)</option>
                    </select>
                    <textarea name="rules" value={formData.rules} onChange={handleChange} placeholder="Rules (one rule per line)" className="md:col-span-2 admin-input w-full text-sm" rows="3"></textarea>
                    <textarea name="description" value={formData.description} onChange={handleChange} placeholder="Description" className="md:col-span-2 admin-input w-full text-sm" rows="3"></textarea>
                    <div className="md:col-span-2 flex justify-end gap-2">
                        <Button onClick={onFormClose} variant="danger">Cancel</Button>
                        <Button type="submit" disabled={loading}>{loading ? 'Saving...' : 'Save Tournament'}</Button>
                    </div>
                </form>
            </Card>
        );
    }

    function Tournaments() {
        const { data: tournaments, loading } = useCollection('tournaments', 'date');
        const [editableTournaments, setEditableTournaments] = useState({});
        const [showCreateForm, setShowCreateForm] = useState(false);
        const [searchTerm, setSearchTerm] = useState('');
        const [statusFilter, setStatusFilter] = useState('all');
        const [gameFilter, setGameFilter] = useState('all');
        const [editingTournament, setEditingTournament] = useState(null);
        const [expandedRules, setExpandedRules] = useState({});
        
        useEffect(() => {
            const initialEditState = tournaments.reduce((acc, t) => {
                acc[t.id] = {
                    title: t.title || t.name || '',
                    game: t.game || '',
                    status: t.status || 'Upcoming',
                    mode: t.mode || 'Solo',
                    roomId: t.roomId || '',
                    roomPassword: t.roomPassword || '',
                    imageUrl: t.imageUrl || '',
                    // New editable fields
                    date: t.date?.seconds ? (() => {
                        const d = new Date(t.date.seconds * 1000);
                        const off = d.getTimezoneOffset();
                        const local = new Date(d.getTime() - off * 60000);
                        return local.toISOString().slice(0,16);
                    })() : '',
                    maxParticipants: t.maxParticipants ?? 0,
                    prizePool: t.prizePool ?? 0,
                    entryFee: t.entryFee ?? 0,
                    rulesString: Array.isArray(t.rules) ? t.rules.join('\n') : (t.rules || ''),
                    description: t.description || ''
                };
                return acc;
            }, {});
            setEditableTournaments(initialEditState);
        }, [tournaments]);

        const handleFieldChange = (id, field, value) => {
            setEditableTournaments(prev => ({ ...prev, [id]: { ...prev[id], [field]: value } }));
        };

        const handleSave = async (id) => {
            const t = editableTournaments[id];
            try {
                // derive teamSize from mode
                let teamSize = 1;
                if (t.mode === 'Team (2 Players)') teamSize = 2;
                if (t.mode === 'Team (4 Players)') teamSize = 4;

                const payload = {
                    title: t.title,
                    game: t.game,
                    status: t.status,
                    mode: t.mode,
                    teamSize,
                    roomId: t.roomId,
                    roomPassword: t.roomPassword,
                    imageUrl: t.imageUrl,
                    date: t.date ? firebase.firestore.Timestamp.fromDate(new Date(t.date)) : null,
                    maxParticipants: parseInt(t.maxParticipants, 10) || 0,
                    prizePool: parseInt(t.prizePool, 10) || 0,
                    entryFee: parseInt(t.entryFee, 10) || 0,
                    rules: (t.rulesString || '').split('\n').map(r => r.trim()).filter(Boolean),
                    description: t.description,
                    isPublic: true, // Ensure tournaments are public for user app
                    updatedAt: serverTimestamp()
                };

                await db.collection('tournaments').doc(id).update(payload);
                alert('Tournament updated successfully!');
            } catch (error) {
                console.error("Error updating tournament: ", error);
                alert(`Failed to update tournament. Error: ${error.message}`);
            }
        };

        // Filter tournaments based on search and filters
        const filteredTournaments = useMemo(() => {
            return tournaments.filter(tournament => {
                const matchesSearch = !searchTerm || 
                    tournament.title?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    tournament.game?.toLowerCase().includes(searchTerm.toLowerCase());
                
                const matchesStatus = statusFilter === 'all' || tournament.status === statusFilter;
                const matchesGame = gameFilter === 'all' || tournament.game === gameFilter;
                
                return matchesSearch && matchesStatus && matchesGame;
            });
        }, [tournaments, searchTerm, statusFilter, gameFilter]);

        // Get unique games for filter dropdown
        const uniqueGames = useMemo(() => {
            return [...new Set(tournaments.map(t => t.game).filter(Boolean))];
        }, [tournaments]);

        const copyToClipboard = (text) => {
            navigator.clipboard.writeText(text);
            alert('Copied to clipboard!');
        };

        const toggleRules = (tournamentId) => {
            setExpandedRules(prev => ({
                ...prev,
                [tournamentId]: !prev[tournamentId]
            }));
        };

        const handleDelete = async (tournamentId) => {
            if (!window.confirm('Are you sure you want to delete this tournament?')) return;
            
            try {
                await db.collection('tournaments').doc(tournamentId).delete();
                alert('Tournament deleted successfully!');
            } catch (error) {
                console.error('Error deleting tournament:', error);
                alert('Failed to delete tournament');
            }
        };

        const getStatusColor = (status) => {
            switch (status) {
                case 'Published': return 'status-published';
                case 'Ongoing': return 'status-ongoing';
                case 'Completed': return 'status-completed';
                case 'Cancelled': return 'status-cancelled';
                default: return 'status-upcoming';
            }
        };

        return (

    function LiveJoins() {
    const [participants, setParticipants] = useState([]);
    const [tournamentsMap, setTournamentsMap] = useState({});
    const [loading, setLoading] = useState(true);
    const [usersMap, setUsersMap] = useState({});

    useEffect(() => {
        const query = db.collectionGroup('participants').orderBy('joinedAt', 'desc');
        const unsubscribeParticipants = query.onSnapshot(async (snapshot) => {
            const participantsData = snapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data(),
                tournamentId: doc.ref.parent.parent.id,
                _source: 'participants',
                _key: doc.ref.path // guaranteed unique across the project
            }));
            // Replace previous participants-source items and keep others, then dedupe by _key
            setParticipants(prev => {
                const others = prev.filter(p => p._source !== 'participants');
                const merged = [...others, ...participantsData];
                const map = new Map();
                merged.forEach(item => map.set(item._key, item));
                return Array.from(map.values());
            });

            const uniqueTournamentIds = [...new Set(participantsData.map(p => p.tournamentId))];
            const tournamentsToFetch = uniqueTournamentIds.filter(id => !tournamentsMap[id]);

            if (tournamentsToFetch.length > 0) {
                const tournamentDocs = await Promise.all(
                    tournamentsToFetch.map(id => db.collection('tournaments').doc(id).get())
                );
                const newTournaments = tournamentDocs.reduce(
                    (acc, doc) => doc.exists ? { ...acc, [doc.id]: doc.data() } : acc,
                    {}
                );
                setTournamentsMap(prevMap => ({ ...prevMap, ...newTournaments }));
            }
            setLoading(false);
        }, (error) => {
            console.error("FATAL ERROR fetching participants:", error.message);
            alert("Could not fetch Live Joins. Check developer console (F12) for an error. You may be missing a Firestore index. The console error will provide a link to create it.");
            setLoading(false);
        });

        const liveJoinsUnsubscribe = db.collection("LIVE_JOINS")
            .orderBy('joinedAt', 'desc')
            .onSnapshot((snapshot) => {
                const liveJoinsData = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data(),
                    _source: 'LIVE_JOINS',
                    _key: `LIVE_JOINS/${doc.id}`
                }));
                // Replace previous LIVE_JOINS-source items and keep others, then dedupe by _key
                setParticipants(prev => {
                    const others = prev.filter(p => p._source !== 'LIVE_JOINS');
                    const merged = [...others, ...liveJoinsData];
                    const map = new Map();
                    merged.forEach(item => map.set(item._key, item));
                    return Array.from(map.values());
                });
            }, (error) => {
                console.error("FATAL ERROR fetching LIVE JOINS:", error.message);
                alert("Could not fetch LIVE JOINS. Check developer console (F12) for an error.");
            });

        return () => {
            unsubscribeParticipants();
            liveJoinsUnsubscribe();
        };
    }, []);

    // Load user emails for participants
    useEffect(() => {
        const userIds = [...new Set(participants.map(p => p.userId).filter(Boolean))];
        const missing = userIds.filter(id => !usersMap[id]);
        if (missing.length === 0) return;

        Promise.all(missing.map(id => db.collection('users').doc(id).get()))
            .then(docs => {
                const map = docs.reduce((acc, d) => { if (d.exists) acc[d.id] = d.data(); return acc; }, {});
                if (Object.keys(map).length) setUsersMap(prev => ({ ...prev, ...map }));
            })
            .catch(err => console.error('LiveJoins users load error:', err));
    }, [participants, usersMap]);

    const groupedParticipants = useMemo(() => {
        const grouped = participants.reduce((acc, participant) => {
            const tournament = tournamentsMap[participant.tournamentId];
            const game = tournament?.game || participant.tournamentGameName || 'Unknown Game';
            if (!acc[game]) acc[game] = [];
            acc[game].push({
                ...participant,
                tournamentTitle: tournament?.title || tournament?.name || participant.tournamentGameName || 'Loading...',
                entryAmount: participant.entryAmount || tournament?.entryFee || 0,
                tournament: tournament
            });
            return acc;
        }, {});
        
        // Sort each game group by tournament creation date (newest first)
        Object.keys(grouped).forEach(game => {
            grouped[game].sort((a, b) => {
                const dateA = a.tournament?.createdAt?.seconds || a.tournament?.date?.seconds || 0;
                const dateB = b.tournament?.createdAt?.seconds || b.tournament?.date?.seconds || 0;
                return dateB - dateA; // Newest first
            });
        });
        
        return grouped;
    }, [participants, tournamentsMap]);

    return (
        <div>
            <SectionHeader title="Live Tournament Entries" />
            {loading ? <div className="spinner mx-auto my-10"></div> :
                (Object.keys(groupedParticipants).length === 0 ? <Card><p>No participants found.</p></Card> :
                    <div className="space-y-8">
                        {Object.keys(groupedParticipants).sort((gameA, gameB) => {
                            // Sort games by their newest tournament creation date
                            const newestTournamentA = groupedParticipants[gameA][0]?.tournament;
                            const newestTournamentB = groupedParticipants[gameB][0]?.tournament;
                            const dateA = newestTournamentA?.createdAt?.seconds || newestTournamentA?.date?.seconds || 0;
                            const dateB = newestTournamentB?.createdAt?.seconds || newestTournamentB?.date?.seconds || 0;
                            return dateB - dateA; // Newest games first
                        }).map(gameName => {
                            const gameParticipants = groupedParticipants[gameName];
                            const firstTournament = gameParticipants[0]?.tournament;
                            const tournamentDateTime = firstTournament?.date;
                            
                            return (
                                <Card key={gameName}>
                                    <div className="mb-4">
                                        <h3 className="text-xl font-bold text-black">{gameName}</h3>
                                        {tournamentDateTime && (
                                            <div className="mt-2 p-3 bg-blue-50 border-l-4 border-blue-400 rounded">
                                                <p className="text-sm font-semibold text-blue-800">Tournament Date & Time:</p>
                                                <p className="text-lg font-bold text-blue-900">
                                                    {tournamentDateTime.seconds 
                                                        ? new Date(tournamentDateTime.seconds * 1000).toLocaleString('en-IN', {
                                                            weekday: 'long',
                                                            year: 'numeric',
                                                            month: 'long',
                                                            day: 'numeric',
                                                            hour: '2-digit',
                                                            minute: '2-digit'
                                                        })
                                                        : new Date(tournamentDateTime).toLocaleString('en-IN', {
                                                            weekday: 'long',
                                                            year: 'numeric',
                                                            month: 'long',
                                                            day: 'numeric',
                                                            hour: '2-digit',
                                                            minute: '2-digit'
                                                        })
                                                    }
                                                </p>
                                            </div>
                                        )}
                                    </div>
                                    <Table headers={['Tournament', 'User Email', 'Game Name', 'Game ID', 'Entry Fee', 'Time']}>
                                        {gameParticipants.map(p => (
                                            <tr key={p._key} className="border-b last:border-b-0">
                                                <td className="py-3 px-4 font-semibold text-black">{p.tournamentTitle}</td>
                                                <td className="py-3 px-4">{usersMap[p.userId]?.email || p.email || 'N/A'}</td>
                                                <td className="py-3 px-4">{p.gameName || p.userGameName || 'N/A'}</td>
                                                <td className="py-3 px-4">{p.gameId || 'N/A'}</td>
                                                <td className="py-3 px-4">🪙 {Math.round(p.entryAmount || 0)}</td>
                                                <td className="py-3 px-4 text-gray-500">
                                                    {p.joinedAt?.seconds ? new Date(p.joinedAt.seconds * 1000).toLocaleString() : 'N/A'}
                                                </td>
                                            </tr>
                                        ))}
                                    </Table>
                                </Card>
                            );
                        })}
                    </div>
                )}
        </div>
    );
}

    function CollectionViewer({ collectionName, title, orderByField = 'createdAt' }) {
        const { data: items, loading } = useCollection(collectionName, orderByField);
        const [searchGameId, setSearchGameId] = useState('');
        const [filteredItems, setFilteredItems] = useState([]);
        
        const headers = useMemo(() => {
            if (items.length === 0) return ['id'];
            const allKeys = items.reduce((keys, item) => {
                Object.keys(item).forEach(key => keys.add(key));
                return keys;
            }, new Set());
            return Array.from(allKeys);
        }, [items]);

        // Filter items based on game ID search (only for user_profiles)
        useEffect(() => {
            if (collectionName !== 'user_profiles' || searchGameId.trim() === '') {
                setFilteredItems(items);
            } else {
                const filtered = items.filter(item => {
                    const gameId = item.gameId || item.gameid || item.game_id || '';
                    return gameId.toString().toLowerCase().includes(searchGameId.toLowerCase());
                });
                setFilteredItems(filtered);
            }
        }, [searchGameId, items, collectionName]);

        return (
            <Card>
                <div className="flex justify-between items-center mb-4">
                    <SectionHeader title={title || collectionName} />
                    {collectionName === 'user_profiles' && (
                        <div className="flex items-center gap-2">
                            <label className="text-sm font-medium text-gray-700">🎮 Game ID:</label>
                            <input
                                type="text"
                                value={searchGameId}
                                onChange={(e) => setSearchGameId(e.target.value)}
                                className="px-3 py-1 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                                placeholder="Search by Game ID..."
                            />
                        </div>
                    )}
                </div>
                
                {collectionName === 'user_profiles' && !loading && items.length > 0 && (
                    <div className="mb-4 text-sm text-gray-600">
                        📊 Showing {filteredItems.length} of {items.length} profiles
                        {searchGameId && (
                            <span className="ml-2 text-blue-600">
                                (filtered by Game ID: "{searchGameId}")
                            </span>
                        )}
                    </div>
                )}

                {loading ? <div className="spinner mx-auto"></div> :
                (collectionName === 'user_profiles' ? filteredItems : items).length === 0 ? (
                    <p>{searchGameId ? `No profiles found with Game ID containing "${searchGameId}"` : 'No items found in this collection.'}</p>
                ) :
                <Table headers={headers}>
                    {(collectionName === 'user_profiles' ? filteredItems : items).map(item => (
                        <tr key={item.id}>
                            {headers.map(header => {
                                const value = item[header];
                                let displayValue = 'N/A';
                                if (value !== null && typeof value !== 'undefined') {
                                    if (typeof value === 'object' && value.seconds) { // Firestore Timestamp
                                        displayValue = new Date(value.seconds * 1000).toLocaleString();
                                    } else if (typeof value === 'object') {
                                        displayValue = JSON.stringify(value);
                                    } else {
                                        displayValue = value.toString();
                                    }
                                }
                                return <td key={header} className="py-2 px-3 align-top text-xs">{displayValue}</td>;
                            })}
                        </tr>
                    ))}
                </Table>}
            </Card>
        );
    }

    function Transactions() {
        console.log('🔥 ENHANCED TRANSACTIONS COMPONENT LOADED - VERSION 3.0 WITH NEW INDEX');
        const [transactions, setTransactions] = useState([]);
        const [loading, setLoading] = useState(true);
        const [users, setUsers] = useState({});
        const [editableTransactions, setEditableTransactions] = useState({});
        const [searchEmail, setSearchEmail] = useState('');
        const [filteredTransactions, setFilteredTransactions] = useState([]);
        const [typeFilter, setTypeFilter] = useState('all');
        const [statusFilter, setStatusFilter] = useState('all');

        // Real-time listener using new Firestore index (type, userId, timestamp)
        useEffect(() => {
            console.log('🚀 Setting up real-time transactions listener with new INDEX');
            setLoading(true);
            
            // Create optimized query using the new composite index
            let query = db.collection('transactions');
            
            // Apply type filter if specified (leverages the new index)
            if (typeFilter !== 'all') {
                query = query.where('type', '==', typeFilter);
            }
            
            // Order by timestamp (part of the composite index)
            query = query.orderBy('timestamp', 'desc').limit(500);
            
            const unsubscribe = query.onSnapshot((snapshot) => {
                console.log('📡 Real-time transactions update received:', snapshot.size, 'documents');
                const transactionsData = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
                
                console.log('💾 Transactions loaded:', transactionsData.length);
                setTransactions(transactionsData);
                setLoading(false);
            }, (error) => {
                console.error('❌ Error in transactions listener:', error);
                setLoading(false);
            });
            
            return () => {
                console.log('🔌 Cleaning up transactions listener');
                unsubscribe();
            };
        }, [typeFilter]); // Re-run when type filter changes

        useEffect(() => {
            console.log('🔍 Fetching user data for transactions:', transactions.length);
            const userIds = [...new Set(transactions.map(t => t.userId).filter(Boolean))];
            console.log('👥 Unique user IDs found:', userIds);
            
            if (userIds.length > 0) {
                const userPromises = userIds.map(id => db.collection('users').doc(id).get());
                Promise.all(userPromises).then(userDocs => {
                    const usersMap = userDocs.reduce((acc, doc) => {
                        if (doc.exists) {
                            acc[doc.id] = doc.data();
                            console.log('✅ User loaded:', doc.id, doc.data().email);
                        } else {
                            console.log('❌ User not found:', doc.id);
                        }
                        return acc;
                    }, {});
                    console.log('📊 Final users map:', usersMap);
                    setUsers(usersMap);
                }).catch(error => {
                    console.error('❌ Error fetching users:', error);
                });
            } else {
                console.log('⚠️ No user IDs found in transactions');
            }
        }, [transactions]);

        useEffect(() => {
            const initialEditState = transactions.reduce((acc, t) => {
                acc[t.id] = {
                    type: t.type || '',
                    amount: t.amount || 0,
                    status: t.status || 'pending'
                };
                return acc;
            }, {});
            setEditableTransactions(initialEditState);
        }, [transactions]);

        // Enhanced filtering with email, status, and type filters
        useEffect(() => {
            let filtered = transactions;
            
            // Filter by email
            if (searchEmail.trim() !== '') {
                filtered = filtered.filter(transaction => {
                    const user = users[transaction.userId];
                    const userEmail = user?.email || transaction.userEmail || '';
                    return userEmail.toLowerCase().includes(searchEmail.toLowerCase());
                });
            }
            
            // Filter by status (client-side for additional filtering)
            if (statusFilter !== 'all') {
                filtered = filtered.filter(transaction => 
                    (transaction.status || 'pending').toLowerCase() === statusFilter.toLowerCase()
                );
            }
            
            console.log(`🔍 Filtered transactions: ${filtered.length} of ${transactions.length} (Email: "${searchEmail}", Status: "${statusFilter}", Type: "${typeFilter}")`);
            setFilteredTransactions(filtered);
        }, [searchEmail, statusFilter, transactions, users]);

        const handleFieldChange = (id, field, value) => {
            setEditableTransactions(prev => ({ 
                ...prev, 
                [id]: { ...prev[id], [field]: field === 'amount' ? parseFloat(value) || 0 : value }
            }));
        };

        const handleStatusChange = async (id, newStatus) => {
            try {
                const transaction = transactions.find(t => t.id === id);
                const transactionType = transaction?.type || 'unknown';
                const userId = transaction?.userId;
                
                console.log(`🚀 REAL-TIME UPDATE: ${transactionType} transaction ${id} status changing to: ${newStatus} for user ${userId}`);
                
                if (!userId) {
                    throw new Error('Transaction userId not found');
                }
                
                // Prepare update data
                const updateData = {
                    status: newStatus,
                    updatedAt: serverTimestamp(),
                    updatedBy: auth.currentUser?.email || 'Mini Admin',
                    lastStatusChange: {
                        from: editableTransactions[id]?.status || 'unknown',
                        to: newStatus,
                        timestamp: serverTimestamp(),
                        updatedBy: auth.currentUser?.email || 'Mini Admin',
                        transactionType: transactionType
                    }
                };
                
                // Use Firestore batch to update both locations atomically
                const batch = db.batch();
                
                // Update global transactions collection
                const globalTransactionRef = db.collection('transactions').doc(id);
                batch.update(globalTransactionRef, updateData);
                
                // Update user's wallet_transactions subcollection (critical for real-time sync)
                const userWalletTransactionRef = db.collection('users').doc(userId).collection('wallet_transactions').doc(id);
                batch.update(userWalletTransactionRef, updateData);
                
                // Commit both updates atomically
                await batch.commit();
                
                console.log(`✅ DUAL UPDATE COMPLETE: Updated both global transactions and user ${userId} wallet_transactions for transaction ${id}`);
                
                // Handle wallet balance updates for tournament_entry transactions only
                if (transactionType === 'tournament_entry' && (newStatus === 'completed' || newStatus === 'approved')) {
                    console.log(`🎮 TOURNAMENT ENTRY: Processing wallet balance update for ${transactionType} transaction ${id}`);
                    
                    try {
                        const userRef = db.collection('users').doc(userId);
                        const amount = Math.abs(transaction.amount || 0);
                        
                        // For tournament entries, deduct from wallet balance (negative amount)
                        await userRef.update({
                            walletBalance: firebase.firestore.FieldValue.increment(-amount),
                            wallet: firebase.firestore.FieldValue.increment(-amount) // Legacy sync
                        });
                        
                        console.log(`🎮 TOURNAMENT ENTRY PROCESSED: Deducted 🪙${amount} from user ${userId} wallet balance`);
                        
                    } catch (balanceError) {
                        console.error(`❌ TOURNAMENT ENTRY BALANCE UPDATE FAILED:`, balanceError);
                        // Don't throw error here as the transaction status was already updated successfully
                    }
                } else {
                    // For non-tournament transactions, no wallet balance changes
                    console.log(`📊 TRANSACTIONS SECTION: Status updated for ${transactionType} transaction ${id} - No wallet balance changes applied`);
                }
                
                // Update local state immediately for instant UI feedback
                setEditableTransactions(prev => ({ 
                    ...prev, 
                    [id]: { ...prev[id], status: newStatus }
                }));
                
                // Enhanced real-time notification event for user apps
                window.dispatchEvent(new CustomEvent('transactionStatusUpdate', {
                    detail: {
                        transactionId: id,
                        newStatus: newStatus,
                        transactionType: transactionType,
                        timestamp: new Date().toISOString(),
                        updatedBy: auth.currentUser?.email || 'Mini Admin',
                        isDepositWithdrawal: transactionType === 'tournament_entry' // Tournament entries affect wallet balance
                    }
                }));

                // Create enhanced notification for user about transaction status change
                if (transaction && transaction.userId) {
                    const typeEmoji = {
                        'deposit': '💰',
                        'withdrawal': '💸',
                        'deposit_request': '📥',
                        'withdrawal_request': '📤',
                        'winningPrize': '🏆',
                        'killPrize': '🎯',
                        'tournament_entry': '🎮',
                        'refund': '🔄',
                        'bonus': '🎁'
                    };
                    
                    const notificationTitle = `${typeEmoji[transactionType] || '💳'} ${transactionType.replace('_', ' ').toUpperCase()} Status ${newStatus.charAt(0).toUpperCase() + newStatus.slice(1)}`;
                    
                    let notificationMessage;
                    if (transactionType === 'tournament_entry' && (newStatus === 'completed' || newStatus === 'approved')) {
                        notificationMessage = `Your tournament entry has been ${newStatus.toLowerCase()} and the entry fee has been deducted from your wallet balance.`;
                    } else {
                        notificationMessage = `Your ${transactionType.replace('_', ' ')} transaction status has been updated to ${newStatus.toLowerCase()}.`;
                    }
                    
                    // Create notification in Firestore (will trigger push notification)
                    await db.collection('notifications').add({
                        userId: transaction.userId,
                        title: notificationTitle,
                        message: notificationMessage,
                        type: 'transaction_status',
                        data: {
                            transactionId: id,
                            status: newStatus,
                            amount: transaction.amount || 0,
                            transactionType: transactionType
                        },
                        isRead: false,
                        createdAt: serverTimestamp()
                    });

                    console.log(`🔔 Enhanced notification created for user ${transaction.userId}: ${notificationTitle}`);
                }
                
                // Show enhanced success notification with transaction type
                const notification = document.createElement('div');
                const isTournamentEntry = transactionType === 'tournament_entry';
                const balanceText = isTournamentEntry && (newStatus === 'completed' || newStatus === 'approved') ? ' & wallet balance updated' : ' (No wallet balance change)';
                const notificationColor = isTournamentEntry ? 'bg-green-500' : 'bg-blue-500';
                notification.className = `fixed top-4 right-4 ${notificationColor} text-white px-4 py-2 rounded-lg shadow-lg z-50`;
                notification.innerHTML = `${isTournamentEntry ? '🎮' : '📊'} ${transactionType.toUpperCase()} status updated to ${newStatus.toUpperCase()}${balanceText}`;
                document.body.appendChild(notification);
                setTimeout(() => notification.remove(), 4000);
                
            } catch (error) {
                console.error("❌ Error updating transaction status: ", error);
                alert(`Failed to update status. Error: ${error.message}`);
                // Revert local state on error
                setEditableTransactions(prev => ({ 
                    ...prev, 
                    [id]: { ...prev[id], status: prev[id]?.status || 'pending' }
                }));
            }
        };

        const handleSave = async (id) => {
            const transactionData = editableTransactions[id];
            const transaction = transactions.find(t => t.id === id);
            const userId = transaction?.userId;
            
            if (!userId) {
                alert('Error: Transaction userId not found');

            try {

                // Update global transactions collection
                const globalTransactionRef = db.collection('transactions').doc(id);
                batch.update(globalTransactionRef, updateData);
                
                // Update user's wallet_transactions subcollection
                const userWalletTransactionRef = db.collection('users').doc(userId).collection('wallet_transactions').doc(id);
                batch.update(userWalletTransactionRef, updateData);
                
                // Commit both updates atomically
                await batch.commit();
                
                console.log(`✅ DUAL SAVE COMPLETE: Updated both global transactions and user ${userId} wallet_transactions for transaction ${id}`);
                alert('Transaction updated successfully in both locations!');

                console.error("❌ Error updating transaction: ", error);

    function CreateMiniAdmin() {
        const [formData, setFormData] = useState({
            username: '',
            email: '',
            password: '',
            confirmPassword: '',
            permissions: {
                dashboard: false,
                users: false,
                wallet_requests: false,

                live_joins: false,

                transactions: false,
                game_profiles: false,
